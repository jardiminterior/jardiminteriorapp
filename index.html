/* swatches de cor favorita — labels traduzidos via STRINGS.color_names */
const COLOR_SWATCHES = [
  {key:'pink',   hex:'#E8849A'}, {key:'red',    hex:'#C8545A'},
  {key:'orange', hex:'#E8924A'}, {key:'yellow', hex:'#C8A840'},
  {key:'green',  hex:'#5A9B6A'}, {key:'blue',   hex:'#4A7AB5'},
  {key:'purple', hex:'#8B6AAA'}, {key:'earth',  hex:'#9A7050'},
];

/* DDI suportados na V1 — emoji flags, sem biblioteca externa */
const DDI_OPTIONS = [
  { flag: '🇧🇷', code: '+55',  label: 'BR' },
  { flag: '🇵🇹', code: '+351', label: 'PT' },
  { flag: '🇨🇭', code: '+41',  label: 'CH' },
  { flag: '🇬🇧', code: '+44',  label: 'UK' },
];

function AddScreen({ onBack, onAdd }) {
  const t    = useT();
  const lang = useContext(LangCtx);
  const [step,      setStep]      = useState(0);
  const [name,      setName]      = useState('');
  const [phone,     setPhone]     = useState('');
  const [ddi,       setDdi]       = useState('+55');
  const [bond,      setBond]      = useState('');
  const [plant,     setPlant]     = useState(null);
  const [favColor,  setFavColor]  = useState('');   /* ── cor favorita escolhida pelo vaso ── */
  const [colorPickerOpen, setColorPickerOpen] = useState(false);
  const [birthday,  setBirthday]  = useState('');
  const [skipBday,  setSkipBday]  = useState(false);
  const nameRef  = useRef(null);
  const phoneRef = useRef(null);

  /* foco automático conforme o step */
  useEffect(()=>{
    const t = setTimeout(()=>{
      if (step===0) nameRef.current?.focus();
      if (step===1) phoneRef.current?.focus();
    }, 280);
    return ()=>clearTimeout(t);
  }, [step]);

  const bonds   = ['amor','família','amizade'];
  const bdayOk  = skipBday || (birthday.split('-')[0] && birthday.split('-')[1]);
  const totalSteps = 6;    /* nome, telefone, vínculo, planta, cor, aniversário */

  function finish() {
    /* concatena DDI + número quando o usuário digitou algo — preserva string vazia se não */
    const fullPhone = phone.trim() ? `${ddi} ${phone.trim()}` : '';
    onAdd({ name, bond, plant, favColor, birthday: skipBday?'':birthday, phone: fullPhone });
  }

  function ProgressDots() {
    return (
      <div style={{display:'flex',gap:5,marginBottom:32}}>
        {[...Array(totalSteps)].map((_,i)=>(
          <div key={i} style={{
            width: i===step ? 18 : 6, height:6, borderRadius:3,
            background: i<step ? C.green2 : i===step ? C.green1 : C.green4,
            transition:'all .3s ease',
          }}/>
        ))}
      </div>
    );
  }

  return (
    <div className="slide-up" style={{height:'100%',display:'flex',flexDirection:'column',padding:'52px 24px 36px'}}>
      <button className="tap" onClick={onBack} style={{
        background:'none',border:'none',fontSize:13,color:C.sub,
        cursor:'pointer',textAlign:'left',marginBottom:24,
      }}>{t('add_cancel_btn')}</button>

      <ProgressDots/>

      {/* ── STEP 0 — nome ── */}
      {step===0 && (
        <div className="fade-in" style={{flex:1,display:'flex',flexDirection:'column'}}>
          <p style={{fontSize:12,color:C.sub,marginBottom:7}}>{t('add_who')}</p>
          <input ref={nameRef} value={name} onChange={e=>setName(e.target.value)}
            placeholder={t('add_name_ph')} maxLength={60}
            onKeyDown={e=>e.key==='Enter'&&name.trim()&&setStep(1)}
            style={{width:'100%',background:'transparent',border:'none',
              borderBottom:`1.5px solid ${C.green3}`,outline:'none',
              fontSize:28,fontWeight:300,color:C.text,fontFamily:'inherit',
              padding:'6px 0',caretColor:C.green2,marginBottom:28}}/>
          <button type="button" className="tap" disabled={!name.trim()}
            onClick={()=>setStep(1)} style={{
            alignSelf:'flex-start',
            background:name.trim()?C.green1:C.green4, border:'none', borderRadius:13,
            padding:'13px 28px', color:name.trim()?C.white:C.sub,
            fontSize:14,fontWeight:500,cursor:name.trim()?'pointer':'default',
            fontFamily:'inherit',transition:'all .2s',
          }}>{t('add_continue')}</button>
        </div>
      )}

      {/* ── STEP 1 — telefone (teclado de discagem) ── */}
      {step===1 && (
        <div className="fade-in" style={{flex:1,display:'flex',flexDirection:'column'}}>
          <p style={{fontSize:12,color:C.sub,marginBottom:4}}>{t('add_phone_for')}</p>
          <h2 style={{fontSize:24,fontWeight:300,color:C.text,marginBottom:24}}>{name}</h2>

          {/* seletor de DDI — 4 países, inline, sem biblioteca */}
          <div role="radiogroup" aria-label="código do país"
            style={{display:'flex',gap:6,marginBottom:18,flexWrap:'wrap'}}>
            {DDI_OPTIONS.map(opt => {
              const active = ddi === opt.code;
              return (
                <button key={opt.code} type="button" role="radio" aria-checked={active}
                  className="tap" onClick={()=>setDdi(opt.code)} style={{
                    display:'inline-flex',alignItems:'center',gap:6,
                    padding:'7px 11px', borderRadius:10,
                    background: active ? C.green5 : 'transparent',
                    border: `1px solid ${active ? C.green2 : C.green4}`,
                    color: active ? C.text : C.sub,
                    fontSize:13, fontWeight: active ? 500 : 400,
                    fontFamily:'inherit', cursor:'pointer',
                    transition:'all .18s', minHeight:34,
                  }}>
                  <span style={{fontSize:15,lineHeight:1}}>{opt.flag}</span>
                  <span style={{letterSpacing:'.02em'}}>{opt.code}</span>
                </button>
              );
            })}
          </div>

          {/* campo grande estilo discador */}
          <div style={{position:'relative',marginBottom:12}}>
            <input
              ref={phoneRef}
              value={phone}
              onChange={e=>setPhone(e.target.value)}
              placeholder="(11) 9 0000-0000"
              type="tel"
              inputMode="tel"
              autoComplete="tel"
              maxLength={24}
              style={{
                width:'100%', background:'transparent', border:'none',
                borderBottom:`2px solid ${phone ? C.green2 : C.green3}`,
                outline:'none', fontSize:32, fontWeight:300,
                color:C.text, fontFamily:'inherit',
                padding:'6px 36px 6px 0',
                caretColor:C.green2,
                letterSpacing:'0.04em',
                transition:'border-color .2s',
              }}
            />
            {phone && (
              <button type="button" onClick={()=>setPhone('')} aria-label={t('aria_clear')} style={{
                position:'absolute',right:0,top:'50%',transform:'translateY(-50%)',
                background:'none',border:'none',fontSize:18,color:C.sub,cursor:'pointer',lineHeight:1,
              }}>×</button>
            )}
          </div>

          <p style={{fontSize:11,color:C.sub,marginBottom:32}}>
            {t('add_phone_hint')}
          </p>

          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <button className="tap" onClick={()=>setStep(2)} style={{
              background:phone.trim()?C.green1:C.green4, border:'none', borderRadius:13,
              padding:'14px 28px', color:phone.trim()?C.white:C.sub,
              fontSize:14,fontWeight:500,cursor:'pointer',
              fontFamily:'inherit',transition:'all .2s',
            }}>{phone.trim()?t('add_continue'):t('add_continue_no_phone')}</button>

            {!phone.trim() && (
              <button className="tap" onClick={()=>phoneRef.current?.focus()} style={{
                background:'none',border:'none',fontSize:12,color:C.sub,
                cursor:'pointer',fontFamily:'inherit',alignSelf:'center',
                textDecoration:'underline',textDecorationStyle:'dotted',
              }}>{t('add_enter_phone')}</button>
            )}
          </div>
        </div>
      )}

      {/* ── STEP 2 — vínculo ── */}
      {step===2 && (
        <div className="fade-in" style={{flex:1}}>
          <p style={{fontSize:12,color:C.sub,marginBottom:4}}>{t('add_bond_q')}</p>
          <h2 style={{fontSize:24,fontWeight:300,color:C.text,marginBottom:24}}>{name}?</h2>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {bonds.map((b,bi)=>(
              <button key={b} className="tap" onClick={()=>{setBond(b);setStep(3);}} style={{
                background:C.card, border:'2px solid transparent', borderRadius:13, padding:'14px 18px',
                color:C.text, fontSize:15, fontWeight:400, cursor:'pointer',
                fontFamily:'inherit', textAlign:'left',
                boxShadow:'0 2px 10px rgba(0,0,0,0.05)', transition:'all .18s',
              }}>{t('bonds')[bi]}</button>
            ))}
          </div>
        </div>
      )}

      {/* ── STEP 3 — planta ── */}
      {step===3 && (
        <div className="fade-in" style={{flex:1,display:'flex',flexDirection:'column'}}>
          <p style={{fontSize:12,color:C.sub,marginBottom:4}}>{t('add_plant_q')}</p>
          <h2 style={{fontSize:24,fontWeight:300,color:C.text,marginBottom:18}}>{name}?</h2>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:9,marginBottom:18,flex:1}}>
            {PLANT_OPTS.slice(0,6).map(p=>(
              <button key={p.id} className="tap" onClick={()=>setPlant(p)} style={{
                background: plant?.id===p.id ? C.green5 : C.card,
                border: plant?.id===p.id ? `2px solid ${C.green2}` : '2px solid transparent',
                borderRadius:15, padding:'12px 6px', cursor:'pointer',
                display:'flex',flexDirection:'column',alignItems:'center',gap:6,
                boxShadow:'0 2px 8px rgba(0,0,0,0.05)', transition:'all .18s',
              }}>
                <div className={plant?.id===p.id?'float':''}>
                  <PlantSVG type={p.type} level={2} color={p.color} size={40}/>
                </div>
                <span style={{fontSize:10,color:C.sub}}>{(t('plant_names')||{})[p.type] || p.name}</span>
              </button>
            ))}
          </div>
          <button className="tap" type="button" disabled={!plant} onClick={()=>setStep(4)} style={{
            background:plant?C.green1:C.green4, border:'none', borderRadius:14,
            padding:'14px', color:plant?C.white:C.sub, fontSize:14, fontWeight:500,
            cursor:plant?'pointer':'default', fontFamily:'inherit', transition:'all .2s',
          }}>{t('add_continue')}</button>
        </div>
      )}

      {/* ── STEP 4 — cor favorita escolhida pelo vaso ── */}
      {step===4 && (
        <div className="fade-in" style={{flex:1,display:'flex',flexDirection:'column'}}>
          <p style={{fontSize:12,color:C.sub,marginBottom:4}}>{t('add_color_q')}</p>
          <h2 style={{fontSize:24,fontWeight:300,color:C.text,marginBottom:6}}>{name}?</h2>
          <p style={{fontSize:11,color:C.sub,marginBottom:26,opacity:.75}}>{t('add_color_hint')}</p>

          {/* preview da planta no vaso tingido */}
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:0,marginBottom:18,flex:1,justifyContent:'center'}}>
            {plant && (
              <div className="float" style={{display:'inline-block',marginBottom:4}}>
                <PlantSVG type={plant.type} level={3} color={plant.color} size={96}/>
              </div>
            )}
            {/* vaso clicável — abre/fecha swatches */}
            <button
              type="button"
              className="tap"
              aria-label={t('add_color_q')}
              onClick={()=>setColorPickerOpen(v=>!v)}
              style={{
                background: colorPickerOpen ? `${favColor||C.green4}22` : 'transparent',
                border:'none', borderRadius:16, padding:'10px 14px',
                cursor:'pointer', transition:'background .2s',
              }}>
              <Pot size={56} tintColor={favColor||null}/>
            </button>
            {/* dica sutil abaixo do vaso */}
            <p style={{fontSize:10,color:C.sub,opacity:.55,marginTop:2,letterSpacing:'.06em',textTransform:'lowercase'}}>
              {t('tap_vase_short')}
            </p>
          </div>

          {/* swatches — só aparecem se o vaso foi tocado */}
          {colorPickerOpen && (
            <div className="fade-in" style={{
              display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center',
              background:C.card, borderRadius:16, padding:'14px 16px',
              marginBottom:14, boxShadow:'0 2px 12px rgba(0,0,0,0.06)',
            }}>
              {COLOR_SWATCHES.map(sw=>(
                <button key={sw.hex} type="button" className="tap"
                  onClick={()=>setFavColor(sw.hex===favColor?'':sw.hex)}
                  title={(t('color_names')||{})[sw.key] || sw.key}
                  style={{
                    width:30,height:30,borderRadius:15,
                    background:sw.hex,border:'none',cursor:'pointer',
                    outline: favColor===sw.hex?`3px solid ${C.green1}`:'3px solid transparent',
                    outlineOffset:2,
                    transform: favColor===sw.hex?'scale(1.15)':'scale(1)',
                    transition:'all .15s',
                  }}/>
              ))}
            </div>
          )}

          <div style={{display:'flex',gap:10,marginTop:'auto'}}>
            <button type="button" className="tap" onClick={()=>{setFavColor('');setStep(5);}} style={{
              flex:1, background:C.card, border:`1.5px solid ${C.green3}`, borderRadius:14,
              padding:'13px', color:C.sub, fontSize:13, cursor:'pointer',
              fontFamily:'inherit', transition:'all .2s',
            }}>{t('add_color_skip')}</button>
            <button type="button" className="tap" onClick={()=>setStep(5)} style={{
              flex:2, background:C.green1, border:'none', borderRadius:14,
              padding:'13px', color:C.white, fontSize:14, fontWeight:500,
              cursor:'pointer', fontFamily:'inherit', transition:'all .2s',
            }}>{t('add_continue')}</button>
          </div>
        </div>
      )}

      {/* ── STEP 5 — aniversário ── */}
      {step===5 && (
        <div className="fade-in" style={{flex:1,display:'flex',flexDirection:'column'}}>
          <p style={{fontSize:12,color:C.sub,marginBottom:4}}>{t('add_bday_q')}</p>
          <h2 style={{fontSize:24,fontWeight:300,color:C.text,marginBottom:32}}>{name}?</h2>

          {!skipBday && (
            <div style={{display:'flex',gap:10,marginBottom:10}}>
              <select value={birthday.split('-')[0]||''}
                onChange={e=>{const d=birthday.split('-')[1]||'';setBirthday(`${e.target.value}-${d}`);}}
                style={{flex:1,background:C.card,border:`1.5px solid ${C.green3}`,
                  borderRadius:12,padding:'13px 10px',fontSize:14,color:C.text,
                  fontFamily:'inherit',outline:'none',appearance:'none',cursor:'pointer'}}>
                <option value="">{t('month_opt')}</option>
                {(STRINGS[lang]||STRINGS.pt).months.map((m,i)=>(
                  <option key={i} value={String(i+1).padStart(2,'0')}>{m}</option>
                ))}
              </select>
              <select value={birthday.split('-')[1]||''}
                onChange={e=>{const m=birthday.split('-')[0]||'';setBirthday(`${m}-${e.target.value}`);}}
                style={{flex:1,background:C.card,border:`1.5px solid ${C.green3}`,
                  borderRadius:12,padding:'13px 10px',fontSize:14,color:C.text,
                  fontFamily:'inherit',outline:'none',appearance:'none',cursor:'pointer'}}>
                <option value="">{t('day_opt')}</option>
                {[...Array(31)].map((_,i)=>(
                  <option key={i} value={String(i+1).padStart(2,'0')}>{i+1}</option>
                ))}
              </select>
            </div>
          )}

          <button className="tap" onClick={()=>setSkipBday(v=>!v)} style={{
            background:'none',border:'none',fontSize:11,color:C.sub,cursor:'pointer',
            fontFamily:'inherit',marginBottom:32,textAlign:'left',
            textDecoration:'underline',textDecorationStyle:'dotted',
          }}>
            {skipBday ? t('add_add_bday') : t('add_skip_bday')}
          </button>

          <div style={{marginTop:'auto'}}>
            <button className="tap" disabled={!bdayOk} onClick={finish} style={{
              width:'100%', background: bdayOk ? C.green1 : C.green4,
              border:'none', borderRadius:14, padding:'15px',
              color: bdayOk ? C.white : C.sub, fontSize:15, fontWeight:500,
              cursor: bdayOk ? 'pointer' : 'default',
              fontFamily:'inherit', transition:'all .2s',
            }}>{t('add_finish', name)}</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   SCHEMA / MIGRAÇÃO de localStorage
   ──────────────────────────────────────────
   Versão atual = 2.
   v1 → v2: garante favColor, events, moments, seasonalMode em todo person.
   Sempre que adicionar campo novo a person, bump da versão e nova migração.
══════════════════════════════════════════ */
const JI_SCHEMA_VERSION = 2;
const JI_SCHEMA_KEY     = 'ji_schema_version';

function migratePerson(p) {
  return {
    favColor:     '',
    events:       [],
    moments:      [],
    seasonalMode: false,
    ...p,
    /* garante que arrays não fiquem null mesmo se o objeto antigo trouxer null explicitamente */
    events:  Array.isArray(p.events)  ? p.events  : [],
    moments: Array.isArray(p.moments) ? p.moments : [],
    /* ── SEGURANÇA: favColor é interpolado em CSS, precisa ser hex válido
       mesmo se o localStorage foi adulterado ou veio de versão antiga ── */
    favColor: safeHex(p.favColor),
  };
}

/* parser dedicado de people: JSON.parse + migração defensiva + bump de schema version.
   Usado pelo hook useLocalStorage como `parse` customizado.
   Throws para qualquer JSON inválido — o hook captura e retorna o default. */
function parsePeople(raw) {
  const parsed = JSON.parse(raw);
  if (!Array.isArray(parsed)) return PEOPLE_DEFAULT;
  /* ── SEGURANÇA: filtra entradas não-objeto antes de migrar.
     Um localStorage adulterado (ex.: [null, 'x', {...}]) quebraria
     migratePerson em p.events/p.moments. Filtrar protege o boot. */
  const safe = parsed.filter(p => p && typeof p === 'object' && !Array.isArray(p));
  const migrated = safe.map(migratePerson);
  try { localStorage.setItem(JI_SCHEMA_KEY, String(JI_SCHEMA_VERSION)); } catch(_) {}
  return migrated;
}

/* ══════════════════════════════════════════
   HOOK: useLocalStorage
   ──────────────────────────────────────────
   Encapsula o padrão lazy-init + persist-on-change.
   - `initial` pode ser valor ou função (estilo useState lazy)
   - `parse`/`stringify` permitem usar formatos não-JSON (ex.: 'true'/'false', int)
   - falhas de leitura/escrita são silenciosas (privado mode, quota, etc.)
══════════════════════════════════════════ */
function useLocalStorage(key, initial, parse = JSON.parse, stringify = JSON.stringify) {
  const [val, setVal] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      if (raw === null || raw === '') {
        return typeof initial === 'function' ? initial() : initial;
      }
      return parse(raw);
    } catch(e) {
      return typeof initial === 'function' ? initial() : initial;
    }
  });
  useEffect(() => {
    try { localStorage.setItem(key, stringify(val)); } catch(_) {}
  }, [key, val]);
  return [val, setVal];
}

/* ══════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════ */
function App() {
  const [lang, setLang] = useState('pt');
  /* sync the module-level _lang var so utility functions (eventCountdown, etc.) can use it */
  useEffect(() => { _lang = lang; }, [lang]);

  /* ── INSTRUMENTAÇÃO LOCAL: log de timestamps de abertura ──
     Uso: medir abertura espontânea durante o pilot (≥60% espontâneo = formação de hábito).
     Privacidade: 100% local, nunca sai do dispositivo. Cap de 200 entradas (~30 dias). */
  useEffect(() => {
    try {
      const KEY = 'ji_open_log';
      const raw = localStorage.getItem(KEY);
      const log = raw ? JSON.parse(raw) : [];
      log.push(new Date().toISOString());
      const trimmed = log.length > 200 ? log.slice(-200) : log;
      localStorage.setItem(KEY, JSON.stringify(trimmed));
    } catch(_) { /* falha silenciosa — instrumentação não pode quebrar o app */ }
  }, []);

  const [screen,        setScreen]       = useState('home');

  /* ── PERSISTÊNCIA: hook useLocalStorage cobre lazy-init + persist-on-change ── */
  const [people, setPeople] = useLocalStorage('ji_people', PEOPLE_DEFAULT, parsePeople);
  const [hiddenFirst, setHiddenFirst] = useLocalStorage(
    'ji_hidden_first', true, raw => raw === 'true', String
  );
  const [hiddenFragIdx, setHiddenFragIdx] = useLocalStorage(
    'ji_frag_idx', 0, raw => parseInt(raw) || 0, String
  );
  /* onboarded: se false, mostra WelcomeScreen no primeiro render */
  const [onboarded, setOnboarded] = useLocalStorage(
    'ji_onboarded', false, raw => raw === 'true', String
  );
  /* demoMode: true quando o usuário entrou via "começar com pessoas demo".
     Limpa quando ele adiciona a primeira pessoa real ou usa o botão "começar meu jardim". */
  const [demoMode, setDemoMode] = useLocalStorage(
    'ji_demo_mode', false, raw => raw === 'true', String
  );

  /* momentsTotal: derivado — soma de todos os momentos de todas as pessoas */
  const momentsTotal = useMemo(
    () => people.reduce((acc, p) => acc + (p.moments?.length || 0), 0),
    [people]
  );

  const [sel,             setSel]            = useState(null);
  const [hiddenOpen,      setHiddenOpen]     = useState(false);
  const [hiddenClosing,   setHiddenClosing]  = useState(false);  /* fade-out da camada */
  const [recentlyCaredId, setRecentlyCaredId] = useState(null);  /* id da planta que acabou de ser cuidada */

  /* ── timers com cleanup — evita state update após unmount ── */
  const hiddenCloseTimer = useRef(null);
  const caredTimer       = useRef(null);
  useEffect(() => () => {
    clearTimeout(hiddenCloseTimer.current);
    clearTimeout(caredTimer.current);
  }, []);

  function goHome()    { setScreen('home'); setSel(null); }
  function goPerson(p) { setSel(p); setScreen('detail'); }
  function goMoment(p) { setSel(p); setScreen('moment'); }
  function goAdd()     { setScreen('add'); }

  /* ── ONBOARDING: handlers do WelcomeScreen ── */
  function handleWelcomeDemo()    { setOnboarded(true); setDemoMode(true);  /* permanece no home com PEOPLE_DEFAULT */ }
  function handleWelcomeScratch() { setPeople([]); setOnboarded(true); setDemoMode(false); setScreen('add'); }

  /* ── EXIT DEMO: limpa pessoas demo, mantém onboarded, recarrega para garden vazio ── */
  function handleExitDemo() {
    try {
      localStorage.setItem('ji_people', '[]');
      localStorage.setItem('ji_onboarded', 'true');
      localStorage.setItem('ji_demo_mode', 'false');
    } catch(_) { /* falha silenciosa — modo privado/quota */ }
    window.location.reload();
  }

  function openHidden() {
    setHiddenOpen(true);
    setHiddenClosing(false);
  }
  function closeHidden() {
    setHiddenFirst(false);
    setHiddenClosing(true);         /* dispara fade-out */
    clearTimeout(hiddenCloseTimer.current);
    hiddenCloseTimer.current = setTimeout(() => {
      setHiddenOpen(false);
      setHiddenClosing(false);
    }, 650);
  }
  function nextFragment() {
    setHiddenFragIdx(v => Math.min(v+1, FRAGMENTS.length-1));
  }

  function handleAdd(p) {
    /* primeira pessoa custom transita o usuário pra fora do modo demo */
    if (demoMode) setDemoMode(false);
    const noteDefault = (STRINGS[lang] || STRINGS.pt).new_bond_note;
    setPeople(prev=>[...prev,{
      id: Date.now(), name:p.name, bond:p.bond, plant:p.plant,
      birthday:p.birthday, phone:p.phone,
      favColor: safeHex(p.favColor),         /* ── SEGURANÇA: só aceita hex válido ── */
      events:[], moments:[],
      lastContactedAt: new Date().toISOString(),
      note: noteDefault,
    }]);
    goHome();
  }

  /* ── MOMENTO: salva texto + atualiza lastContactedAt + dispara bloom ── */
  function handleMomentSave(personId, text) {
    const moment = { id: Date.now(), text, createdAt: new Date().toISOString() };
    const update = p => ({
      ...p,
      lastContactedAt: new Date().toISOString(),
      moments: [...(p.moments || []), moment],
    });
    setPeople(prev => prev.map(p => p.id === personId ? update(p) : p));
    setSel(prev => prev && prev.id === personId ? update(prev) : prev);
    setRecentlyCaredId(personId);
    clearTimeout(caredTimer.current);
    caredTimer.current = setTimeout(() => setRecentlyCaredId(null), 1900);
  }

  /* ── CONTATO RÁPIDO (swipe): só atualiza timestamp, sem gravar texto ── */
  function handleQuickContact(personId) {
    const update = p => ({ ...p, lastContactedAt: new Date().toISOString() });
    setPeople(prev => prev.map(p => p.id === personId ? update(p) : p));
    setRecentlyCaredId(personId);
    clearTimeout(caredTimer.current);
    caredTimer.current = setTimeout(() => setRecentlyCaredId(null), 1900);
  }

  function handleEditPlant(personId, newPlant) {
    setPeople(prev => prev.map(p =>
      p.id === personId ? { ...p, plant: { type: newPlant.type, color: newPlant.color, level: p.plant.level } } : p
    ));
    setSel(prev => prev ? { ...prev, plant: { type: newPlant.type, color: newPlant.color, level: prev.plant.level } } : prev);
  }

  function handleEditColor(personId, hex) {
    /* ── SEGURANÇA: só aceita hex válido (defense-in-depth) ── */
    const clean = safeHex(hex);
    setPeople(prev => prev.map(p => p.id === personId ? { ...p, favColor: clean } : p));
    setSel(prev => prev ? { ...prev, favColor: clean } : prev);
  }

  function handleSaveEdits(personId, updates) {
    setPeople(prev => prev.map(p => p.id === personId ? { ...p, ...updates } : p));
    setSel(prev => prev ? { ...prev, ...updates } : prev);
  }

  function handleAddEvent(personId, ev) {
    const update = p => ({ ...p, events: [...(p.events||[]), ev] });
    setPeople(prev => prev.map(p => p.id===personId ? update(p) : p));
    setSel(prev => prev ? update(prev) : prev);
  }

  function handleDeleteEvent(personId, evId) {
    const update = p => ({ ...p, events: (p.events||[]).filter(e=>e.id!==evId) });
    setPeople(prev => prev.map(p => p.id===personId ? update(p) : p));
    setSel(prev => prev ? update(prev) : prev);
  }

  return (
    <LangCtx.Provider value={lang}>
    <div style={{width:'100%',height:'100%',position:'relative',overflow:'hidden'}}>
      {/* Onboarding tem prioridade sobre todas as telas no primeiro acesso */}
      {!onboarded && (
        <WelcomeScreen
          onDemo={handleWelcomeDemo}
          onScratch={handleWelcomeScratch}
        />
      )}
      {onboarded && screen==='home'   && <HomeScreen
                              people={people}
                              onPerson={goPerson}
                              onAdd={goAdd}
                              onQuickMoment={handleQuickContact}
                              momentsTotal={momentsTotal}
                              onOpenHidden={openHidden}
                              recentlyCaredId={recentlyCaredId}
                              hiddenFragIdx={hiddenFragIdx}
                              hiddenUnlocked={momentsTotal>=3}
                              onToggleLang={()=>setLang(l=>l==='pt'?'en':'pt')}
                              isDemoMode={demoMode}
                              onExitDemo={handleExitDemo}
                            />}
      {onboarded && screen==='detail' && <DetailScreen
                              person={sel}
                              onBack={goHome}
                              onMoment={goMoment}
                              onEditPlant={handleEditPlant}
                              onEditColor={handleEditColor}
                              onSaveEdits={handleSaveEdits}
                              onAddEvent={handleAddEvent}
                              onDeleteEvent={handleDeleteEvent}
                            />}
      {onboarded && screen==='moment' && <MomentScreen
                              person={sel}
                              onBack={()=>setScreen('detail')}
                              onSave={handleMomentSave}
                            />}
      {onboarded && screen==='add'    && <AddScreen onBack={goHome} onAdd={handleAdd}/>}

      {/* camada oculta — entrada e saída atmosférica */}
      {onboarded && hiddenOpen && (
        <div
          className={hiddenClosing ? 'hidden-darken-out' : 'hidden-darken-in'}
          style={{ position:'absolute', inset:0, zIndex:200 }}
        >
          {/* conteúdo aparece depois do escurecimento */}
          {!hiddenClosing && (
            <div style={{ animation:'hiddenFadeIn 1s ease both', animationDelay:'.55s' }}>
              <HiddenLayerScreen
                firstVisit={hiddenFirst}
                fragIndex={hiddenFragIdx}
                onNext={nextFragment}
                onClose={closeHidden}
              />
            </div>
          )}
        </div>
      )}
    </div>
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
