  <!-- Dependências: local-first (offline-ready), CDN-fallback (online).
       Para habilitar modo offline, rode uma vez com internet:
         cd vendor && bash fetch.sh
       O loader tenta ./vendor/* primeiro; se 404, cai no CDN automaticamente.
       Depois que tudo carregou, chama Babel.transformScriptTags() para processar
       o <script type="text/babel"> do body (carga dinâmica não aciona sozinha). -->
  <script>
    (function(){
      var LIBS = [
        { local: './vendor/react.development.js',     cdn: 'https://unpkg.com/react@18.2.0/umd/react.development.js' },
        { local: './vendor/react-dom.development.js', cdn: 'https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js' },
        { local: './vendor/babel.min.js',             cdn: 'https://unpkg.com/@babel/standalone@7.23.10/babel.min.js' }
      ];
      function load(i){
        if (i >= LIBS.length){
          if (typeof Babel !== 'undefined' && typeof Babel.transformScriptTags === 'function'){
            Babel.transformScriptTags();
          }
          return;
        }
        var s = document.createElement('script');
        s.src = LIBS[i].local;
        s.onload  = function(){ load(i+1); };
        s.onerror = function(){
          var c = document.createElement('script');
          c.src = LIBS[i].cdn;
          c.onload  = function(){ load(i+1); };
          c.onerror = function(){ load(i+1); };
          document.head.appendChild(c);
        };
        document.head.appendChild(s);
      }
      load(0);
    })();
  </script>

    .slide-up  { animation: slideUp .38s ease forwards; }
    .float     { animation: float     3.8s ease-in-out infinite; }
    .float-slow{ animation: floatSlow 5s ease-in-out infinite; }
    .pulse     { animation: pulse  2.4s ease-in-out infinite; }
    .shimmer   { animation: shimmer 2s ease-in-out infinite; }
    .scroll-hidden::-webkit-scrollbar { display:none; }

    .tap { cursor:pointer; transition:transform .14s ease, opacity .14s ease; -webkit-tap-highlight-color:transparent; }
    .tap:active { transform:scale(0.96); opacity:.82; }

    /* ── CAMADA OCULTA ── */
    @keyframes hiddenFadeIn {
      from { opacity:0; }
      to   { opacity:1; }
    }
    @keyframes hiddenWordIn {
      from { opacity:0; letter-spacing:.3em; }
      to   { opacity:1; letter-spacing:.06em; }
    }
    @keyframes hiddenProseIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes hiddenBreath {
      0%,100% { opacity:.5; transform:scale(1); }
      50%     { opacity:.8; transform:scale(1.04); }
    }
    @keyframes longPressGrow {
      from { box-shadow: 0 0 0px 0px rgba(90,140,100,0); }
      to   { box-shadow: 0 0 24px 8px rgba(90,140,100,0.35); }
    }
    .hidden-entry   { animation: hiddenFadeIn 1.4s ease forwards; }
    .hidden-word    { animation: hiddenWordIn 1.8s ease forwards; }
    .hidden-prose   { animation: hiddenProseIn 1s ease forwards; }
    .hidden-breath  { animation: hiddenBreath 4s ease-in-out infinite; }
    .pressing-plant { animation: longPressGrow 1.4s ease forwards; border-radius:50%; }

    /* ── SWIPE MOMENTO ── */
    @keyframes swipeReveal {
      from { opacity:0; transform:translateX(-8px); }
      to   { opacity:1; transform:translateX(0); }
    }
    @keyframes momentFlash {
      0%   { opacity:1; }
      60%  { opacity:.7; }
      100% { opacity:0; }
    }

    /* ── PLANTA BLOOM (reação ao momento) ── */
    @keyframes bloomOut {
      0%   { opacity:.85; transform:scale(0.5); }
      40%  { opacity:1;   transform:scale(1.35); }
      100% { opacity:0;   transform:scale(2); }
    }
    .plant-bloom { animation: bloomOut 1.6s ease-out forwards; }

    /* ── CAMADA OCULTA — entrada atmosférica ── */
    @keyframes darkenIn {
      0%   { background: rgba(17,25,22,0); }
      55%  { background: rgba(17,25,22,0.96); }
      100% { background: rgba(17,25,22,1); }
    }
    @keyframes darkenOut {
      from { background: rgba(17,25,22,1); }
      to   { background: rgba(17,25,22,0); }
    }
    .hidden-darken-in  { animation: darkenIn  1.1s ease forwards; }
    .hidden-darken-out { animation: darkenOut .65s ease forwards; }

    /* ── REGA — gota pulsante ── */
    @keyframes dropPulse {
      0%,100% { opacity:.35; transform:scale(1) translateY(0); }
      50%     { opacity:.7;  transform:scale(1.15) translateY(-2px); }
    }
    .rega-drop { animation: dropPulse 2.8s ease-in-out infinite; }

    /* ── A11Y: respeitar preferência de movimento reduzido ──
       desliga apenas animações decorativas/infinitas — entradas curtas
       (fade-in, scale-in, slide-up) ficam para preservar feedback de transição. */
    @media (prefers-reduced-motion: reduce) {
      .float, .float-slow, .pulse, .shimmer,
      .hidden-breath, .plant-bloom, .rega-drop,
      .pressing-plant {
        animation: none !important;
      }
    }

    /* ── A11Y: foco visível por teclado em elementos interativos ──
       complementa o reset de outline em inputs/buttons sem prejudicar mouse/touch */
    .tap:focus-visible,
    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    [role="switch"]:focus-visible {
      outline: 2px solid #527A61;
      outline-offset: 2px;
      border-radius: inherit;
    }

<script>

      var boot = document.getElementById('ji-boot');

      var missingBabel = typeof Babel === 'undefined';
      boot.innerHTML =

            (missingReact || missingBabel
              ? 'abra o arquivo com internet ao menos uma vez para baixar as bibliotecas.'
              : 'tente recarregar a página.') +
          '</div>' +
        '</div>';
    }, 6500);
  })();
</script>

/* ── HELPERS DE EVENTO ── */
function eventDateTime(dateStr, timeStr) {
  return new Date(`${dateStr}T${timeStr}:00`);
}
function eventCountdown(dateStr, timeStr) {
  if (!dateStr || !timeStr) return null;
  const dt   = eventDateTime(dateStr, timeStr);
  const now  = new Date();
  const diff = dt - now;
  if (diff < 0) return null;
  const totalMins = Math.floor(diff / 60000);
  const days      = Math.floor(totalMins / 1440);
  const hours     = Math.floor((totalMins % 1440) / 60);
  const mins      = totalMins % 60;
  const s = STRINGS[_lang] || STRINGS.pt;
  if (days > 1)     return { label: s.evt_days(days),    urgency: 'low'    };
  if (days === 1)   return { label: s.evt_tmrw(timeStr), urgency: 'medium' };
  if (hours > 0)    return { label: s.evt_hours(hours),  urgency: 'high'   };
  if (totalMins > 0) return { label: s.evt_mins(mins),   urgency: 'now'    };
  return null;
}
function isEventToday(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr + 'T00:00:00');
  return d.toDateString() === TODAY.toDateString();
}
function isEventTomorrow(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr + 'T00:00:00');
  const tom = new Date(TODAY); tom.setDate(tom.getDate()+1);
  return d.toDateString() === tom.toDateString();
}
function formatEventDate(dateStr) {
  if (!dateStr) return '';
  const s = STRINGS[_lang] || STRINGS.pt;
  const [,m,d] = dateStr.split('-').map(Number);
  return s.date_fmt(d, s.months[m-1]);
}

function daysUntilBirthday(dateStr) {
  if (!dateStr) return null;
  const [m,d] = dateStr.split('-').map(Number);
  const next = new Date(TODAY.getFullYear(), m-1, d);
  if (next < TODAY) next.setFullYear(TODAY.getFullYear()+1);
  return Math.ceil((next - TODAY) / 86400000);
}
function formatBirthday(dateStr) {
  if (!dateStr) return '';
  const s = STRINGS[_lang] || STRINGS.pt;
  const [m,d] = dateStr.split('-').map(Number);
  return s.bday_fmt(d, s.months[m-1]);
}

/* ── SANITIZAÇÃO DE HEX ──
   favColor pode vir do localStorage (tampering) ou de migrações antigas.
   Como é interpolado em template-literals de CSS (`${color}09`...), é preciso
   validar contra um regex restrito para bloquear CSS injection.
   Aceita apenas #RGB, #RGBA, #RRGGBB, #RRGGBBAA. */
function safeHex(c) {
  if (typeof c !== 'string') return '';
  return /^#[0-9a-fA-F]{3,8}$/.test(c) ? c : '';
}

/* ── SANITIZAÇÃO DE E164 ── retorna null se não houver dígitos suficientes
   para discar; protege tel:/wa.me contra URLs vazias (`tel:+55`). */
function safeE164(raw) {
  const digits = (raw || '').replace(/\D/g, '');
  if (digits.length < 8) return null; /* não é telefone plausível */
  return digits.startsWith('55') ? digits : `55${digits}`;
}

/* ── SCORE DE CUIDADO (invisível ao usuário) ──
   Baseado em dados preenchidos — afeta o crescimento da planta.
   Retorna 0–4. */
function careScore(person) {
  let s = 0;
  if (person.birthday) s += 1;
  if (person.phone)    s += 0.8;
  if (person.favColor) s += 0.7;
  const d = daysSince(person);
  if      (d <= 2)  s += 1;
  else if (d <= 7)  s += 0.5;
  else if (d >= 14) s -= 0.5;
  return Math.max(0, Math.min(4, s));
}

/* ── ESTADO DE VIDA — 4 níveis suaves, anti-guilt ──
   seasonalMode:true                         → dormant   (quieto, nunca degrada)
   nunca contatado (sem histórico)           → healthy   (não murcha por ausência)
   ≤  3 dias desde último contato            → thriving  (celebração da proximidade)
   ≤ 14 dias                                 → healthy
   > 14 dias                                 → fading    (degradação suave, sem sépia)
   Usa lastContactedAt (ISO timestamp) se presente; lastSeen (string legacy) como fallback */
function lifeTier(person) {
  if (person && person.seasonalMode) return 'dormant';
  const neverContacted = !person.lastContactedAt && !person.lastSeen;
  if (neverContacted) return 'healthy';
  let d;
  if (person.lastContactedAt) {
    d = Math.floor((Date.now() - new Date(person.lastContactedAt).getTime()) / 86400000);
  } else {
    d = parseInt(person.lastSeen) || 99;
  }
  if (d <=  3) return 'thriving';
  if (d <= 14) return 'healthy';
  return               'fading';
}

/* dias desde o último contato — para exibição */
function daysSince(person) {
  if (person.lastContactedAt) {
    return Math.floor((Date.now() - new Date(person.lastContactedAt).getTime()) / 86400000);
  }
  return parseInt(person.lastSeen) || 99;
}

/* nível de crescimento — combina score + tier (tier calculado uma vez externamente) */
function plantLevel(score, tier) {
  let base = score >= 3.2 ? 4 : score >= 2.0 ? 3 : score >= 0.9 ? 2 : 1;
  if (tier === 'fading') base = Math.max(1, base - 1);
  /* dormant: preserva o nível — relação adormecida, não diminuída */
  return base;
}

/* CSS filter — score não é usado, só o tier */
function plantFilter(tier) {
  switch(tier) {
    case 'thriving':
      return 'saturate(1.9) brightness(1.10) drop-shadow(0 4px 12px rgba(74,130,88,0.40))';
    case 'healthy':
      return 'saturate(1.35) brightness(1.05)';
    case 'fading':
      /* degradação suave — sem sépia, apenas perda de vivacidade */
      return 'saturate(0.75) brightness(0.97)';
    case 'dormant':
      /* quieto, contemplativo — nunca triste */
      return 'saturate(0.62) brightness(1.00)';
    default:
      return 'saturate(1)';
  }
}

/* opacidade — score não é usado, só o tier */
function plantOpacity(tier) {
  switch(tier) {
    case 'thriving': return 1;
    case 'healthy':  return 1;
    case 'fading':   return 0.82;
    case 'dormant':  return 0.75;
    default:         return 1;
  }
}

/* ═══════════════════════════════════════════════
   SVG PLANTAS — versão elaborada
═══════════════════════════════════════════════ */
function PlantSVG({ type, level=2, color='#4A7A58', size=64 }) {
  const s = size;
  const c = color;
  const dark = `${c}CC`;
  const mid  = `${c}99`;
  const lite = `${c}55`;

  /* -- SAMAMBAIA -- fronde arqueada com pinulas */
  if (type === 'fern') {
    const stems = Math.min(3 + level, 6);
    const angles = [-50,-30,-12,12,30,50].slice(0, stems);
    return (
      <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} overflow="visible">
        {angles.map((a, si) => {
          const rad = a * Math.PI/180;
          const len = s*(0.38 + si%2*0.06);
          const cx = s/2, cy = s*0.82;
          const tx = cx + Math.sin(rad)*len;
          const ty = cy - Math.cos(rad)*len;
          const cpx = cx + Math.sin(rad)*len*0.5 + Math.cos(rad)*s*0.08;
          const cpy = cy - Math.cos(rad)*len*0.5 + Math.sin(rad)*s*0.05;
          const leafCount = 5 + level;
          return (
            <g key={si}>
              <path d={`M ${cx} ${cy} Q ${cpx} ${cpy} ${tx} ${ty}`}
                stroke={mid} strokeWidth="1.2" fill="none"/>
              {[...Array(leafCount)].map((_,li) => {
                const t = (li+1)/(leafCount+1);
                const px = cx + Math.sin(rad)*len*t + Math.cos(rad)*(s*0.08*(1-t));
                const py = cy - Math.cos(rad)*len*t + Math.sin(rad)*(s*0.08*(1-t));
                const leafAngle = a + (li%2===0?60:-60);
                const ll = s*(0.08 - t*0.03);
                return (
                  <ellipse key={li}
                    cx={px} cy={py} rx={ll} ry={ll*0.35}
                    transform={`rotate(${leafAngle},${px},${py})`}
                    fill={dark} opacity={0.75+t*0.15}
                  />
                );
              })}
            </g>
          );
        })}
      </svg>
    );
  }

  /* -- MONSTERA -- folhas fenestradas */
  if (type === 'monstera') {
    const leafData = [
      {cx:s*.44,cy:s*.42,rx:s*.18,ry:s*.13,rot:-20,slits:2},
      {cx:s*.56,cy:s*.28,rx:s*.16,ry:s*.12,rot:22,slits:1},
      level>=3?{cx:s*.38,cy:s*.25,rx:s*.14,ry:s*.10,rot:-35,slits:1}:null,
      level>=4?{cx:s*.60,cy:s*.44,rx:s*.12,ry:s*.09,rot:40,slits:1}:null,
    ].filter(Boolean);
    return (
      <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} overflow="visible">
        {/* stem */}
        <path d={`M ${s*.5} ${s*.82} Q ${s*.46} ${s*.55} ${s*.44} ${s*.42}`}
          stroke={mid} strokeWidth="1.8" fill="none" strokeLinecap="round"/>
        <path d={`M ${s*.5} ${s*.72} Q ${s*.54} ${s*.5} ${s*.56} ${s*.28}`}
          stroke={mid} strokeWidth="1.5" fill="none" strokeLinecap="round"/>
        {level>=3 && <path d={`M ${s*.5} ${s*.65} Q ${s*.44} ${s*.44} ${s*.38} ${s*.25}`}
          stroke={lite} strokeWidth="1.2" fill="none" strokeLinecap="round"/>}
        {leafData.map((l,i)=>(
          <g key={i}>
            <ellipse cx={l.cx} cy={l.cy} rx={l.rx} ry={l.ry}
              transform={`rotate(${l.rot},${l.cx},${l.cy})`} fill={dark} opacity=".82"/>
            {/* fendas */}
            {[...Array(l.slits)].map((_,si)=>{
              const ox = l.rx*0.4*(si+1)/(l.slits+1);
              const cosa=Math.cos(l.rot*Math.PI/180),sina=Math.sin(l.rot*Math.PI/180);
              const ex = l.cx+ox*cosa, ey = l.cy+ox*sina;
              return <ellipse key={si} cx={ex} cy={ey} rx={l.rx*.12} ry={l.ry*.45}
                transform={`rotate(${l.rot},${ex},${ey})`} fill={C.bg} opacity=".9"/>;
            })}
            {/* veia central */}
            <line x1={l.cx-l.rx*.7*Math.cos(l.rot*Math.PI/180)}
                  y1={l.cy-l.rx*.7*Math.sin(l.rot*Math.PI/180)}
                  x2={l.cx+l.rx*.7*Math.cos(l.rot*Math.PI/180)}
                  y2={l.cy+l.rx*.7*Math.sin(l.rot*Math.PI/180)}
              stroke={C.bg} strokeWidth=".8" opacity=".5"/>
          </g>
        ))}
      </svg>
    );
  }

  /* -- BONSAI -- copa irregular com galhos */
  if (type === 'bonsai') {
    const cloudCx = s*0.5, cloudCy = s*0.34;
    const branches = [
      {x1:s*.5,y1:s*.78,x2:s*.5,y2:s*.54},
      {x1:s*.5,y1:s*.54,x2:s*.34,y2:s*.42},{x1:s*.5,y1:s*.54,x2:s*.66,y2:s*.40},
      level>=3?{x1:s*.5,y1:s*.62,x2:s*.28,y2:s*.52}:null,
      level>=4?{x1:s*.5,y1:s*.62,x2:s*.72,y2:s*.50}:null,
    ].filter(Boolean);
    const blobs = [
      {cx:cloudCx,     cy:cloudCy,     r:s*.22},
      {cx:cloudCx-.14*s,cy:cloudCy+.04*s,r:s*.15},
      {cx:cloudCx+.15*s,cy:cloudCy+.03*s,r:s*.14},
      level>=2?{cx:cloudCx-.08*s,cy:cloudCy-.12*s,r:s*.12}:null,
      level>=3?{cx:cloudCx+.10*s,cy:cloudCy-.10*s,r:s*.11}:null,
      level>=4?{cx:cloudCx,      cy:cloudCy+.14*s, r:s*.10}:null,
    ].filter(Boolean);
    return (
      <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} overflow="visible">
        {branches.map((b,i)=>(
          <line key={i} x1={b.x1} y1={b.y1} x2={b.x2} y2={b.y2}
            stroke={dark} strokeWidth={i===0?2.2:1.4} strokeLinecap="round"/>
        ))}
        {blobs.map((b,i)=>(
          <circle key={i} cx={b.cx} cy={b.cy} r={b.r} fill={dark} opacity={.72-.04*i}/>
        ))}
      </svg>
    );
  }

  /* -- SUCULENTA -- roseta */
  if (type === 'succulent') {
    const petals = 5 + level*2;
    const layers = Math.min(level+1,3);
    return (
      <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} overflow="visible">
        {[...Array(layers)].map((_,li)=>{
          const layerPetals = petals - li*2;
          const r = s*(0.22-li*0.06);
          const pRx = s*(0.10-li*0.02), pRy = s*(0.18-li*0.04);
          return [...Array(layerPetals)].map((_,pi)=>{
            const a = (pi*360/layerPetals - li*15) * Math.PI/180;
            const px = s/2+Math.sin(a)*r, py = s*.62-Math.cos(a)*r*.65;
            return (
              <ellipse key={`${li}-${pi}`}
                cx={px} cy={py} rx={pRx} ry={pRy}
                transform={`rotate(${pi*360/layerPetals - li*15},${px},${py})`}
                fill={dark} opacity={.65+li*.12}
              />
            );
          });
        })}
        <circle cx={s/2} cy={s*.62} r={s*.06} fill={dark}/>
      </svg>
    );
  }

  /* -- ORQUÍDEA -- flores com pétalas delicadas */
  if (type === 'orchid') {
    const stemX = s*0.5;
    const flowers = Math.min(1+level, 4);
    const flPositions = [
      {x:stemX,y:s*.26},{x:stemX-s*.08,y:s*.38},{x:stemX+s*.07,y:s*.44},{x:stemX,y:s*.52}
    ].slice(0,flowers);
    return (
      <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} overflow="visible">
        {/* caule */}
        <path d={`M ${stemX} ${s*.82} Q ${stemX-s*.05} ${s*.55} ${stemX} ${s*.26}`}
          stroke={`${color}88`} strokeWidth="1.5" fill="none" strokeLinecap="round"/>
        {/* folhas base */}
        <ellipse cx={stemX-s*.1} cy={s*.74} rx={s*.1} ry={s*.05}
          transform={`rotate(-30,${stemX-s*.1},${s*.74})`} fill={`${color}66`}/>
        <ellipse cx={stemX+s*.1} cy={s*.76} rx={s*.1} ry={s*.05}
          transform={`rotate(30,${stemX+s*.1},${s*.76})`} fill={`${color}55`}/>
        {/* flores */}
        {flPositions.map((fl,fi)=>(
          <g key={fi}>
            {[0,72,144,216,288].map((a,pi)=>{
              const rad=a*Math.PI/180;
              const px=fl.x+Math.sin(rad)*s*.09, py=fl.y-Math.cos(rad)*s*.07;
              return <ellipse key={pi} cx={px} cy={py} rx={s*.07} ry={s*.045}
                transform={`rotate(${a},${px},${py})`} fill={dark} opacity={fi===0?.90:.75}/>;
            })}
            <circle cx={fl.x} cy={fl.y} r={s*.03} fill={C.white} opacity=".9"/>
            <circle cx={fl.x} cy={fl.y} r={s*.015} fill={dark}/>
          </g>
        ))}
      </svg>
    );
  }

  /* -- LAVANDA -- espigas finas */
  if (type === 'lavender') {
    const spikes = Math.min(3+level, 6);
    const offsets = [-s*.18,-s*.09,0,s*.09,s*.18,s*.27].slice(0,spikes);
    return (
      <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} overflow="visible">
        {offsets.map((ox,i)=>{
          const bx=s/2+ox, by=s*.82;
          const lean=ox*0.35;
          const tx=bx+lean, ty=by-s*.48;
          const flLen=s*(0.18-Math.abs(i-spikes/2)*0.015);
          return (
            <g key={i}>
              <line x1={bx} y1={by} x2={tx} y2={ty}
                stroke={`${color}88`} strokeWidth="1.3" strokeLinecap="round"/>
              {[...Array(Math.max(4,3+level))].map((_,li)=>{
                const t=(li)/(3+level);
                const fx=bx+lean*t, fy=by-s*.28*t-s*.06;
                return (
                  <ellipse key={li} cx={fx} cy={fy-(li*s*.04)}
                    rx={s*.04} ry={s*.025} fill={dark} opacity={.7+li*.03}/>
                );
              })}
            </g>
          );
        })}
      </svg>
    );
  }

  /* -- CACTO -- corpo com nervuras + espinhos */
  if (type === 'cactus') {
    const bodyW=s*.14, bodyH=s*.52;
    const cx=s/2, cy=s*.82;
    const arms = level>=2 ? [{side:-1,y:s*.55},{side:1,y:s*.50}].slice(0,level-1) : [];
    return (
      <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} overflow="visible">
        {/* corpo */}
        <rect x={cx-bodyW/2} y={cy-bodyH} width={bodyW} height={bodyH}
          rx={bodyW/2} fill={dark} opacity=".85"/>
        {/* nervuras */}
        {[-bodyW*.2, 0, bodyW*.2].map((ox,i)=>(
          <line key={i} x1={cx+ox} y1={cy-bodyH*.9} x2={cx+ox} y2={cy-bodyH*.05}
            stroke={C.bg} strokeWidth=".8" opacity=".3"/>
        ))}
        {/* espinhos */}
        {[.2,.4,.6,.8].map((t,i)=>[[-1,i],[1,i]].map(([sd,j])=>(
          <line key={`${i}-${sd}`}
            x1={cx+sd*bodyW*.5} y1={cy-bodyH*t}
            x2={cx+sd*(bodyW*.5+s*.06)} y2={cy-bodyH*t-s*.02}
            stroke={dark} strokeWidth=".9" opacity=".6"/>
        )))}
        {/* braços */}
        {arms.map((arm,i)=>(
          <g key={i}>
            <path d={`M ${cx+arm.side*bodyW*.4} ${arm.y} Q ${cx+arm.side*s*.18} ${arm.y} ${cx+arm.side*s*.18} ${arm.y-s*.12}`}
              stroke={dark} strokeWidth={bodyW*.7} fill="none"
              strokeLinecap="round" opacity=".85"/>
            {/* nervura braço */}
            <path d={`M ${cx+arm.side*bodyW*.4} ${arm.y} Q ${cx+arm.side*s*.18} ${arm.y} ${cx+arm.side*s*.18} ${arm.y-s*.12}`}
              stroke={C.bg} strokeWidth=".7" fill="none" opacity=".25"/>
          </g>
        ))}
        {/* topo arredondado já coberto pelo rx */}
      </svg>
    );
  }

  /* -- OLIVEIRA -- copa assimétrica com folhas finas */
  if (type === 'olive') {
    const twigs = [
      {a:-45,len:s*.28},{a:-20,len:s*.32},{a:5,len:s*.30},{a:28,len:s*.26},{a:50,len:s*.22}
    ].slice(0, 3+level);
    return (
      <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} overflow="visible">
        {/* tronco */}
        <path d={`M ${s*.5} ${s*.82} Q ${s*.48} ${s*.62} ${s*.5} ${s*.5}`}
          stroke={`${color}99`} strokeWidth="2.5" fill="none" strokeLinecap="round"/>
        {twigs.map((tw,ti)=>{
          const rad=tw.a*Math.PI/180;
          const ox=s*.5+Math.sin(rad)*tw.len*.1, oy=s*.5-Math.cos(rad)*tw.len*.1;
          const leafPairs = 4+level;
          return (
            <g key={ti}>
              {/* galho */}
              {[...Array(leafPairs)].map((_,li)=>{
                const t=(li+1)/(leafPairs+1);
                const lx=ox+Math.sin(rad)*tw.len*t;
                const ly=oy-Math.cos(rad)*tw.len*t;
                return [[-1],[1]].map(([sd])=>(
                  <ellipse key={`${li}-${sd}`}
                    cx={lx+Math.cos(rad)*sd*s*.045}
                    cy={ly+Math.sin(rad)*sd*s*.045}
                    rx={s*.055} ry={s*.018}
                    transform={`rotate(${tw.a+sd*70},${lx+Math.cos(rad)*sd*s*.045},${ly+Math.sin(rad)*sd*s*.045})`}
                    fill={dark} opacity={.65+t*.2}
                  />
                ));
              })}
            </g>
          );
        })}
      </svg>
    );
  }

  /* fallback */
  return <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} overflow="visible">
    <circle cx={s/2} cy={s/2} r={s*.25} fill={color} opacity=".6"/>
  </svg>;
}

/* ── VASO ── */
function Pot({ size=32, color='#C4B49A', tintColor=null }) {
  const w=size, h=size*.72;
  /* se tiver cor favorita, o vaso a usa com opacidade suave */
  const potColor = tintColor || color;
  const useTint  = !!tintColor;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      {/* camada base neutra */}
      <path d={`M ${w*.16} ${h*.22} L ${w*.84} ${h*.22} L ${w*.70} ${h} L ${w*.30} ${h} Z`}
        fill={color} opacity=".72"/>
      {/* camada de cor favorita */}
      {useTint && (
        <path d={`M ${w*.16} ${h*.22} L ${w*.84} ${h*.22} L ${w*.70} ${h} L ${w*.30} ${h} Z`}
          fill={potColor} opacity=".42"/>
      )}
      {/* boca */}
      <rect x={w*.08} y={0} width={w*.84} height={h*.25} rx={h*.08} fill={color} opacity=".88"/>
      {useTint && (
        <rect x={w*.08} y={0} width={w*.84} height={h*.25} rx={h*.08} fill={potColor} opacity=".38"/>
      )}
      {/* terra */}
      <ellipse cx={w*.5} cy={h*.22} rx={w*.38} ry={h*.08} fill={`${color}CC`}/>
    </svg>
  );
}

/* ── BADGE VÍNCULO ── */
function BondBadge({ bond }) {
  const t = useT();
  const style = {
    amor:    {bg:'#FAE8EC',c:'#8B3A4A'},
    família: {bg:'#E6EEF5',c:'#3A5F7A'},
    amizade: {bg:'#EBF4E8',c:'#3A6B3A'},
  }[bond] || {bg:C.green5,c:C.green1};

  const label = bond === 'amor' ? t('bond_amor')
    : bond === 'família' ? t('bond_familia')
    : bond === 'amizade' ? t('bond_amizade')

/* ── CHIP ANIVERSÁRIO ── */
function BirthdayChip({ days, small=false }) {
  const t = useT();
  if (days === null || days > 30) return null;
  const isToday = days === 0;
  const isSoon  = days <= 7;
  const label   = isToday ? t('bday_today') : t('bday_soon', days);
  return (
    <span style={{
      background: isSoon ? C.birthday : '#F0A882',
      color: C.white,
      fontSize: small ? 9 : 10,
      fontWeight: 600,
      padding: small ? '1px 6px' : '2px 8px',
      borderRadius: 20,
      letterSpacing: '.01em',
    }} className={isToday ? 'pulse' : ''}>
      {label}
    </span>
  );
}

/* ══════════════════════════════════════════
   CAMADA OCULTA — Tela
══════════════════════════════════════════ */
function HiddenLayerScreen({ firstVisit, fragIndex, onNext, onClose }) {
  const t    = useT();
  const lang = useContext(LangCtx);
  /* fases: 'dark' → 'found' → 'today' → 'content' */
  const [phase,        setPhase]        = useState(firstVisit ? 'dark' : 'content');
  const [paraIndex,    setParaIndex]    = useState(0);
  const [audioPlaying, setAudioPlaying] = useState(false);
  const [exiting,      setExiting]      = useState(false);

  const frag     = FRAGMENTS[Math.min(fragIndex, FRAGMENTS.length-1)];
  const fragText = frag.text[lang] || frag.text.pt;

  /* timer de fechamento com cleanup (evita state update após unmount) */
  const closeTimer = useRef(null);
  useEffect(() => () => clearTimeout(closeTimer.current), []);

  useEffect(()=>{
    if (phase==='dark') {
      const t = setTimeout(()=>setPhase('found'), 1600);
      return ()=>clearTimeout(t);
    }
    if (phase==='found') {
      const t = setTimeout(()=>setPhase('today'), 2800);
      return ()=>clearTimeout(t);
    }
    if (phase==='today') {
      const t = setTimeout(()=>setPhase('content'), 2000);
      return ()=>clearTimeout(t);
    }
  },[phase]);

  /* avança parágrafo ao tocar */
  function advance() {
    if (frag.locked && paraIndex >= fragText.length-1) return;
    if (paraIndex < fragText.length-1) {
      setParaIndex(v=>v+1);
    }
  }

  function handleClose() {
    setExiting(true);
    clearTimeout(closeTimer.current);
    closeTimer.current = setTimeout(onClose, 700);
  }

  const showAudio   = !frag.locked && paraIndex === fragText.length-1;
  const showLocked  = frag.locked  && paraIndex === fragText.length-1;
  const showNext    = !frag.locked && paraIndex === fragText.length-1 && fragIndex < FRAGMENTS.length-1;

  return (
    <div style={{
      position:'absolute',inset:0,
      background: H.bg,
      display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      opacity: exiting ? 0 : 1,
      transition: exiting ? 'opacity .7s ease' : 'none',
      zIndex:100,
    }} className={firstVisit && phase==='dark' ? 'hidden-entry' : ''}>

      {/* ── FASE DE ENTRADA ── */}
      {(phase==='dark') && (
        <div/>
      )}

      {phase==='found' && (
        <p className="hidden-word" style={{
          fontSize:13, fontWeight:300, color:H.text,
          letterSpacing:'.06em', textAlign:'center',
          userSelect:'none',
        }}>
          {t('hidden_found')}
        </p>
      )}

      {phase==='today' && (
        <p className="hidden-word" style={{
          fontSize:11, fontWeight:300, color:H.sub,
          letterSpacing:'.12em', textAlign:'center',
          userSelect:'none', textTransform:'uppercase',
        }}>
          {t('hidden_today')}
        </p>
      )}

      {/* ── CONTEÚDO ── */}
      {phase==='content' && (
        <div style={{
          width:'100%', height:'100%',
          display:'flex', flexDirection:'column',
          padding:'60px 32px 40px',
        }}>

          {/* fechar */}
          <button onClick={handleClose} style={{
            alignSelf:'flex-end', background:'none', border:'none',
            color:H.sub, fontSize:11, cursor:'pointer',
            fontFamily:'inherit', letterSpacing:'.08em',
            marginBottom:48, textTransform:'lowercase',
          }}>← {t('hidden_back')}</button>

          {/* linha divisória */}
          <div style={{width:32, height:1, background:H.line, marginBottom:44}}/>

          {/* parágrafo atual */}
          <div key={paraIndex} className="hidden-prose"
            onClick={advance}
            style={{flex:1, cursor: paraIndex < fragText.length-1 ? 'pointer' : 'default'}}>
            {fragText[paraIndex].split('\n').map((line,i)=>(
              <p key={i} style={{
                fontSize: line===''?0:15,
                fontWeight:300,
                color: H.prose,
                lineHeight:1.9,
                marginBottom: line===''?12:0,
                fontFamily:'inherit',
                letterSpacing:'.01em',
                userSelect:'none',
              }}>{line}</p>
            ))}

            {/* avançar — apenas se há mais */}
            {paraIndex < fragText.length-1 && (
              <p style={{
                fontSize:10, color:H.sub, marginTop:32,
                letterSpacing:'.08em', textTransform:'lowercase',
                userSelect:'none',
              }}>{t('hidden_tap_continue')}</p>
            )}
          </div>

          {/* ── ÁUDIO (último parágrafo, fragmento não bloqueado) ── */}
          {showAudio && (
            <div className="hidden-prose" style={{
              display:'flex', flexDirection:'column', alignItems:'center', gap:16,
              paddingBottom:8,
            }}>
              <div style={{width:32,height:1,background:H.line,marginBottom:8}}/>
              <button
                onClick={()=>setAudioPlaying(v=>!v)}
                className="hidden-breath"
                style={{
                  width:52, height:52, borderRadius:26,
                  background:'none', border:`1px solid ${H.sub}`,
                  display:'flex', alignItems:'center', justifyContent:'center',
                  cursor:'pointer', transition:'border-color .3s',
                  borderColor: audioPlaying ? H.gold : H.sub,
                }}>
                {audioPlaying
                  ? <svg width="14" height="14" viewBox="0 0 14 14">
                      <rect x="2" y="2" width="4" height="10" rx="1" fill={H.gold}/>
                      <rect x="8" y="2" width="4" height="10" rx="1" fill={H.gold}/>
                    </svg>
                  : <svg width="14" height="14" viewBox="0 0 14 14">
                      <polygon points="3,1 13,7 3,13" fill={H.text}/>
                    </svg>
                }
              </button>
              {audioPlaying && (
                <p style={{fontSize:9,color:H.sub,letterSpacing:'.1em',textTransform:'lowercase'}}>
                  {t('hidden_listen')}
                </p>
              )}
            </div>
          )}

          {/* ── FRAGMENTO BLOQUEADO — soft gate ── */}
          {showLocked && (
            <div className="hidden-prose" style={{paddingBottom:8}}>
              <div style={{width:32,height:1,background:H.line,marginBottom:28}}/>
              <p style={{
                fontSize:12, color:H.gold, lineHeight:1.8,
                letterSpacing:'.02em', fontWeight:300,
                marginBottom:24, userSelect:'none',
              }}>
                {t('hidden_lock_line1')}
              </p>
              <p style={{
                fontSize:10, color:H.sub, lineHeight:1.7,
                letterSpacing:'.03em', fontWeight:300,
                userSelect:'none',
              }}>
                {t('hidden_lock_line2a')}<br/>{t('hidden_lock_line2b')}
              </p>
            </div>
          )}

          {/* ── PRÓXIMO FRAGMENTO ── */}
          {showNext && (
            <button onClick={onNext} style={{
              alignSelf:'flex-start',
              background:'none', border:'none',
              color:H.sub, fontSize:10,
              cursor:'pointer', fontFamily:'inherit',
              letterSpacing:'.08em', textTransform:'lowercase',
              marginTop:16,
            }}>{t('hidden_more')}</button>
          )}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   TELA — HOME
══════════════════════════════════════════ */
function HomeScreen({ people, onPerson, onAdd, onQuickMoment, momentsTotal,
                      onOpenHidden, recentlyCaredId, hiddenFragIdx, hiddenUnlocked, onToggleLang,
                      isDemoMode, onExitDemo }) {
  const t    = useT();
  const lang = useContext(LangCtx);
  const hour = new Date().getHours();
  const greet = hour<12?t('greet_morning'):hour<18?t('greet_afternoon'):t('greet_evening');
  const upcoming = people.filter(p=>{
    const d=daysUntilBirthday(p.birthday); return d!==null && d<=7;
  });

  /* ── HIDRATAÇÃO: uma frase por abertura do app, cicla via localStorage ──
     BUG FIX: antes o useMemo dependia de [lang] e reincrementava o cursor
     a cada toggle de idioma, queimando frases mais rápido do que o spec
     ("uma por abertura"). Agora o índice é lido + incrementado uma vez por
     mount (useEffect([])), e o render apenas traduz a frase com base nele. */
  const [hydIdx, setHydIdx] = useState(0);
  useEffect(() => {
    try {
      const KEY = 'ji_hyd_idx';
      const cur = parseInt(localStorage.getItem(KEY) || '0') || 0;
      const len = (HYDRATION.pt || []).length || 1;
      const idx = ((cur % len) + len) % len;  /* safe modulo */
      setHydIdx(idx);
      localStorage.setItem(KEY, String((cur + 1) % len));
    } catch(_) { /* falha silenciosa: mantém idx=0 inicial */ }
  }, []);
  const hydMsg = useMemo(() => {
    const arr = HYDRATION[lang] || HYDRATION.pt;
    const len = arr.length || 1;
    return arr[((hydIdx % len) + len) % len];
  }, [lang, hydIdx]);

  /* ── long press na planta ── */
  const lpTimer  = useRef(null);
  const lpStart  = useRef(null);                 /* posição inicial do toque/click */
  const LP_MOVE_TOLERANCE = 10;                  /* px: tolera micro-movimentos sem cancelar */
  const [pressingId, setPressingId] = useState(null);
  const threshold = momentsTotal >= 3; /* só ativa se o jardim tem vida */

  /* ── swipe para momento ── */
  const swipeRef  = useRef({});   /* {id, startX, curX} */
  const [swipeId, setSwipeId]   = useState(null);
  const [swipeDx, setSwipeDx]   = useState(0);
  const [swipeDone, setSwipeDone] = useState(null); /* id do card que acabou de disparar */
  const SWIPE_TRIGGER = 72;       /* px mínimos para confirmar */
  /* ref para o timeout de limpeza do swipeDone — evita state update após unmount */
  const swipeDoneTimer = useRef(null);
  useEffect(() => () => {
    clearTimeout(swipeDoneTimer.current);
    clearTimeout(lpTimer.current);
  }, []);

  function onSwipeStart(personId, e) {
    /* não swipa se está no modo long-press ou se tocou na planta */
    if (pressingId) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    swipeRef.current = { id: personId, startX: x, curX: x };
    setSwipeId(personId);
    setSwipeDx(0);
  }
  function onSwipeMove(e) {
    if (!swipeRef.current.id) return;
    const x   = e.touches ? e.touches[0].clientX : e.clientX;
    const dx  = Math.max(0, x - swipeRef.current.startX);
    swipeRef.current.curX = x;
    setSwipeDx(Math.min(dx, SWIPE_TRIGGER + 20));
  }
  function onSwipeEnd(personId) {
    if (!swipeRef.current.id) return;
    const dx = swipeRef.current.curX - swipeRef.current.startX;
    swipeRef.current = {};
    if (dx >= SWIPE_TRIGGER) {
      setSwipeDone(personId);
      /* handler recebe apenas o id — o swipe atualiza timestamp sem gravar texto */
      onQuickMoment && onQuickMoment(personId);
      clearTimeout(swipeDoneTimer.current);
      swipeDoneTimer.current = setTimeout(() => setSwipeDone(null), 900);
    }
    setSwipeId(null);
    setSwipeDx(0);
  }

  /* ── indicador de rega ── */
  /* aparece quando: jardim desbloqueado + há fragmento novo disponível */
  const regaVisible = hiddenUnlocked && hiddenFragIdx < FRAGMENTS.filter(f=>!f.locked).length - 1;

  function startPress(personId, e) {
    if (!threshold) return;
    e.stopPropagation();
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    lpStart.current = { x, y };
    setPressingId(personId);
    lpTimer.current = setTimeout(()=>{
      setPressingId(null);
      lpStart.current = null;
      onOpenHidden();
    }, 1400);
  }
  function cancelPress(e) {
    e && e.stopPropagation();
    clearTimeout(lpTimer.current);
    lpStart.current = null;
    setPressingId(null);
  }
  /* só cancela se o dedo saiu da área de tolerância — evita falsos-positivos de jitter */
  function maybeCancelOnMove(e) {
    if (!lpStart.current) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const dx = x - lpStart.current.x, dy = y - lpStart.current.y;
    if (Math.hypot(dx, dy) > LP_MOVE_TOLERANCE) cancelPress(e);
  }

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',paddingBottom:24}}>

      {/* header */}
      <div className="fade-in" style={{padding:'54px 24px 20px',display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
        <div>
          <p style={{fontSize:12,color:C.sub,marginBottom:3}}>{greet}</p>
          <h1 style={{fontSize:27,fontWeight:300,color:C.text,lineHeight:1.2}}>{t('garden_title')}</h1>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,marginTop:4}}>
          {/* ── indicador de rega — gota discreta quando há novo fragmento ── */}
          {regaVisible && (
            <div className="rega-drop" title={t('garden_tooltip')} style={{
              fontSize:18, userSelect:'none', pointerEvents:'none',
            }}>💧</div>
          )}
          {/* ── toggle de idioma ── */}
          <button onClick={onToggleLang} style={{
            background:'none', border:`1px solid ${C.green3}`, borderRadius:8,
            padding:'4px 9px', fontSize:10, fontWeight:500, color:C.sub,
            cursor:'pointer', fontFamily:'inherit', letterSpacing:'.04em',
            transition:'all .18s',
          }}>{t('lang_btn')}</button>
        </div>
      </div>

      {/* banner aniversários */}
      {upcoming.length>0 && (
        <div className="fade-in" style={{
          margin:'0 16px 12px', background:C.birthdaySoft,
          borderRadius:16, padding:'12px 16px',
          borderLeft:`3px solid ${C.birthday}`,
        }}>
          <p style={{fontSize:11,color:C.birthday,fontWeight:600,marginBottom:4,
            letterSpacing:'.03em',textTransform:'uppercase'}}>{t('upcoming_bdays')}</p>
          {upcoming.map(p=>(
            <p key={p.id} style={{fontSize:13,color:C.text,lineHeight:1.6}}>
              <span style={{fontWeight:500}}>{p.name}</span>
              <span style={{color:C.sub}}> — {formatBirthday(p.birthday)}
                {daysUntilBirthday(p.birthday)===0?' '+t('today_bday'):' '+t('in_days',daysUntilBirthday(p.birthday))}
              </span>
            </p>
          ))}
        </div>
      )}

      {/* empty state */}
      {people.length === 0 && (
        <div className="fade-in" style={{
          flex:1,display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',
          padding:'0 40px',textAlign:'center',
        }}>
          <div className="float-slow" style={{marginBottom:20,opacity:.55}}>
            <PlantSVG type="fern" level={1} color={C.green3} size={64}/>
          </div>
          <p style={{fontSize:15,fontWeight:400,color:C.text,marginBottom:8,lineHeight:1.5}}>
            {t('empty_garden')}
          </p>
          <p style={{fontSize:13,color:C.sub,lineHeight:1.7,marginBottom:28}}>
            {t('empty_sub').split('\n').map((l,i)=><span key={i}>{l}{i===0&&<br/>}</span>)}
          </p>
          <button className="tap" onClick={onAdd} style={{
            background:C.green1,border:'none',borderRadius:14,
            padding:'13px 28px',color:C.white,fontSize:14,fontWeight:500,
            cursor:'pointer',fontFamily:'inherit',
          }}>
            {t('add_first')}
          </button>
        </div>
      )}

      {/* lista */}
      <div className="scroll-hidden" style={{flex:1,overflowY:'auto',padding:'0 16px',display:people.length===0?'none':'block'}}>
        {people.map((p,i)=>{
          const days      = daysUntilBirthday(p.birthday);
          const sc        = careScore(p);
          const tier      = lifeTier(p);
          const isPressing = pressingId === p.id;
          const isSwiping  = swipeId === p.id;
          const isBloom    = recentlyCaredId === p.id;
          const isDone     = swipeDone === p.id;
          const dx         = isSwiping ? swipeDx : 0;
          const swipeRatio = Math.min(dx / SWIPE_TRIGGER, 1);

          return (
            <div key={p.id} className="fade-in" style={{
              animationDelay:`${i*55}ms`,
              position:'relative', overflow:'hidden',
              borderRadius:20, marginBottom:9,
              boxShadow:'0 2px 14px rgba(0,0,0,0.055)',
            }}>

              {/* fundo verde revelado pelo swipe */}
              <div style={{
                position:'absolute', top:0, left:0, right:0, bottom:0,
                borderRadius:20,
                background:`linear-gradient(90deg, ${C.green2}, ${C.green1})`,
                display:'flex', alignItems:'center', padding:'0 22px',
                opacity: isDone ? 1 : swipeRatio,
                transition: isSwiping ? 'none' : 'opacity .4s ease',
              }}>
                {(swipeRatio > 0.3 || isDone) && (
                  <span style={{fontSize:13,fontWeight:500,color:C.white}}>
                    {isDone ? t('swipe_done') : t('swipe_hint')}
                  </span>
                )}
              </div>

              {/* card deslizante */}
              {/* BUG FIX (desktop swipe cancel): onMouseLeave cancelava o swipe
                 assim que o mouse saía do card, mesmo com o botão pressionado.
                 Agora só finaliza o swipe por onMouseLeave quando o usuário
                 já passou do limiar (auto-confirma). Caso contrário, o swipe
                 permanece ativo e termina normalmente no onMouseUp. */}
              <div className="tap"
                onClick={()=>{ if(!isPressing && dx < 4) onPerson(p); }}
                onTouchStart={e=>onSwipeStart(p.id,e)}
                onTouchMove={onSwipeMove}
                onTouchEnd={()=>onSwipeEnd(p.id)}
                onMouseDown={e=>onSwipeStart(p.id,e)}
                onMouseMove={onSwipeMove}
                onMouseUp={()=>onSwipeEnd(p.id)}
                onMouseLeave={()=>{
                  if (swipeRef.current.id === p.id
                      && (swipeRef.current.curX - swipeRef.current.startX) >= SWIPE_TRIGGER) {
                    onSwipeEnd(p.id);
                  }
                }}
                style={{
                  position:'relative', zIndex:1,
                  display:'flex', alignItems:'center', gap:14,
                  background: p.favColor
                    ? `linear-gradient(105deg, ${p.favColor}09 0%, ${C.card} 55%)`
                    : C.card,
                  borderRadius:20, padding:'14px 18px',
                  borderLeft: days!==null&&days<=7 ? `3px solid ${C.birthday}`
                    : p.favColor ? `3px solid ${p.favColor}55` : '3px solid transparent',
                  transform:`translateX(${dx}px)`,
                  transition: isSwiping ? 'none' : 'transform .35s ease',
                  willChange:'transform',
                }}>

                {/* planta — long press (com tolerância de movimento para não cancelar em jitter) */}
                <div
                  onMouseDown={e=>{ e.stopPropagation(); startPress(p.id,e); }}
                  onMouseUp={e=>{ e.stopPropagation(); cancelPress(e); }}
                  onMouseLeave={e=>{ e.stopPropagation(); cancelPress(e); }}
                  onTouchStart={e=>{ e.stopPropagation(); startPress(p.id,e); }}
                  onTouchEnd={e=>{ e.stopPropagation(); cancelPress(e); }}
                  onTouchMove={e=>{ e.stopPropagation(); maybeCancelOnMove(e); }}
                  style={{
                    position:'relative', width:54, height:58, flexShrink:0,
                    filter:plantFilter(tier), opacity:plantOpacity(tier),
                    transition:'filter .6s ease, opacity .6s ease, box-shadow .3s ease',
                    borderRadius:8,
                    boxShadow: isPressing
                      ? '0 0 22px 6px rgba(90,140,100,0.45)'
                      : '0 0 0px 0px rgba(90,140,100,0)',
                  }}>
                  {isBloom && (
                    <div className="plant-bloom" style={{
                      position:'absolute', top:'-8px', left:'-8px', right:'-8px', bottom:'-8px',
                      borderRadius:'50%',
                      background:`radial-gradient(circle, ${p.plant.color}88 0%, transparent 68%)`,
                      pointerEvents:'none', zIndex:3,
                    }}/>
                  )}
                  <div className="float" style={{position:'absolute',bottom:14,left:'50%',transform:'translateX(-50%)'}}>
                    <PlantSVG type={p.plant.type} level={plantLevel(sc,tier)} color={p.plant.color} size={42}/>
                  </div>
                  <div style={{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)'}}>
                    <Pot size={26} tintColor={p.favColor||null}/>
                  </div>
                </div>

                {/* info */}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3,flexWrap:'wrap'}}>
                    <span style={{fontSize:15,fontWeight:500,color:C.text}}>{p.name}</span>
                    <BondBadge bond={p.bond}/>
                    <BirthdayChip days={days} small/>
                    {(p.events||[]).map(ev=>{
                      const cd = eventCountdown(ev.date,ev.time);
                      if (!cd) return null;
                      const isUrgent = cd.urgency==='high'||cd.urgency==='now';
                      return (
                        <span key={ev.id} style={{
                          background:isUrgent?'#E8F0FF':'#F0F4FF',
                          color:isUrgent?'#3A5AAA':'#5A72AA',
                          fontSize:10,fontWeight:600,
                          padding:'2px 6px',borderRadius:20,letterSpacing:'.01em',
                        }} className={cd.urgency==='now'?'pulse':''}>
                          {isUrgent?'● ':''}
                          {isEventToday(ev.date)?t('evt_today'):isEventTomorrow(ev.date)?t('evt_tomorrow'):cd.label}
                        </span>
                      );
                    })}
                  </div>
                  {(() => {
                    const last = p.moments && p.moments.length > 0 ? p.moments[p.moments.length-1] : null;
                    return (
                      <p style={{fontSize:12,color:C.sub,whiteSpace:'nowrap',overflow:'hidden',
                        textOverflow:'ellipsis',lineHeight:1.4}}>
                        {last ? last.text : p.note}
                      </p>
                    );
                  })()}
                </div>

              {/* sem texto de recência — o score silencioso já comunica via planta */}
            </div>
            </div>
          );
        })}
      </div>

      {/* lembrete de hidratação — sempre visível, discreto, cicla por abertura */}
      <div style={{
        display:'flex', alignItems:'center', justifyContent:'center', gap:6,
        padding:'4px 20px 2px', opacity:.42,
        userSelect:'none', transition:'opacity .6s ease',
      }}>
        <svg width="9" height="12" viewBox="0 0 24 28" aria-hidden="true" style={{flexShrink:0}}>
          <path d="M12 2 C8 10 4 15 4 20 A8 8 0 0 0 20 20 C20 15 16 10 12 2 Z"
                fill="none" stroke={C.green2} strokeWidth="1.6" strokeLinejoin="round"/>
        </svg>
        <span style={{
          fontSize:11, color:C.sub, fontStyle:'italic',
          letterSpacing:'.02em', lineHeight:1.4,
        }}>{hydMsg}</span>
      </div>

      {/* mensagem gatilho — aparece quando o jardim tem vida, quase invisível */}
      {threshold && (
        <p style={{
          textAlign:'center', fontSize:10, color:C.text,
          opacity:.22, letterSpacing:'.1em',
          fontStyle:'italic', paddingBottom:6,
          userSelect:'none', pointerEvents:'none',
          transition:'opacity 2s ease',
        }}>
          {t('garden_trigger')}
        </p>
      )}

      {/* FAB */}
      <div style={{padding:'6px 24px 0',display:'flex',justifyContent:'flex-end'}}>
        <button className="tap" onClick={onAdd} aria-label={t('aria_add_person')} style={{
          width:56,height:56,borderRadius:28,background:C.green1,border:'none',
          color:C.white,fontSize:26,cursor:'pointer',fontFamily:'inherit',
          boxShadow:`0 8px 24px ${C.green1}55`,
          display:'flex',alignItems:'center',justifyContent:'center',
        }}>+</button>
      </div>

      {/* exit demo — discreto, só aparece enquanto o usuário está no jardim demo */}
      {isDemoMode && (
        <div style={{padding:'14px 24px 0',display:'flex',justifyContent:'center'}}>
          <button type="button" className="tap" onClick={onExitDemo} style={{
            background:'none', border:'none', fontFamily:'inherit',
            fontSize:12, fontWeight:400, color:C.sub,
            cursor:'pointer', letterSpacing:'.02em',
            textDecoration:'underline', textDecorationStyle:'dotted',
            textUnderlineOffset:4, padding:'6px 4px',
          }}>{t('start_my_garden_btn')}</button>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   TELA — DETALHE  (modo visual / modo edição)
══════════════════════════════════════════ */
function DetailScreen({ person, onBack, onMoment, onEditPlant, onEditColor, onSaveEdits, onAddEvent, onDeleteEvent }) {
  const t    = useT();
  const lang = useContext(LangCtx);
  const sc   = careScore(person);
  const tier = lifeTier(person);   /* calculado uma vez, reutilizado em filter/opacity/level */
  const days = daysUntilBirthday(person.birthday);
  const lastMoment = person.moments && person.moments.length > 0
    ? person.moments[person.moments.length - 1]
    : null;

  /* ── estados ── */
  const [done,         setDone]         = useState(false);
  const [editMode,     setEditMode]     = useState(false);
  const [colorPicker,  setColorPicker]  = useState(false);
  const [plantSheet,   setPlantSheet]   = useState(false);
  const [pickedPlant,  setPickedPlant]  = useState(null);
  const [addingEvent,  setAddingEvent]  = useState(false);
  const [evTitle,      setEvTitle]      = useState('');
  const [evDate,       setEvDate]       = useState('');
  const [evTime,       setEvTime]       = useState('');
  const evTitleRef = useRef(null);

  /* estados locais do modo edição */
  const [eName,     setEName]     = useState(person.name);
  const [eBond,     setEBond]     = useState(person.bond);
  const [ePhone,    setEPhone]    = useState(person.phone||'');
  const [eBday,     setEBday]     = useState(person.birthday||'');
  const [eSkipBday, setESkipBday] = useState(!person.birthday);
  const [eSeasonal, setESeasonal] = useState(!!person.seasonalMode);

  /* sincroniza locais quando person muda externamente */
  useEffect(()=>{ setEName(person.name); setEBond(person.bond);
    setEPhone(person.phone||''); setEBday(person.birthday||'');
    setESkipBday(!person.birthday);
    setESeasonal(!!person.seasonalMode); }, [person.id]);

  /* timers com cleanup — previne state update após unmount */
  const evFocusTimer = useRef(null);
  const momentTimer  = useRef(null);
  useEffect(() => () => {
    clearTimeout(evFocusTimer.current);
    clearTimeout(momentTimer.current);
  }, []);

  useEffect(()=>{
    if (addingEvent) {
      clearTimeout(evFocusTimer.current);
      evFocusTimer.current = setTimeout(()=>evTitleRef.current?.focus(), 120);
    }
  },[addingEvent]);

  function handleMoment() {
    setDone(true);
    clearTimeout(momentTimer.current);
    momentTimer.current = setTimeout(()=>onMoment(person), 550);
  }

  function saveEdits() {
    onSaveEdits(person.id, {
      name:         eName.trim() || person.name,
      bond:         eBond,
      phone:        ePhone.trim(),
      birthday:     eSkipBday ? '' : eBday,
      seasonalMode: eSeasonal,
    });
    setEditMode(false);
  }

  function submitEvent() {
    if (!evTitle.trim()||!evDate||!evTime) return;
    onAddEvent(person.id,{id:Date.now(),title:evTitle.trim(),date:evDate,time:evTime});
    setEvTitle(''); setEvDate(''); setEvTime(''); setAddingEvent(false);
  }

  function confirmPlant() {
    if (pickedPlant) onEditPlant(person.id, pickedPlant);
    setPlantSheet(false); setPickedPlant(null);
  }

  /* links de contato — e164 será null se o número for inválido/curto demais,
     o que desativa os botões de ligar/WhatsApp (evita tel:+55 vazio). */
  const e164 = safeE164(person.phone);

  /* ── MODO VISUAL ── */
  if (!editMode) return (
    <div className="scale-in" style={{height:'100%',display:'flex',flexDirection:'column',position:'relative'}}>

      {/* header */}
      <div style={{
        padding:'50px 24px 24px', textAlign:'center',
        background: person.favColor
          ? `linear-gradient(160deg, ${person.favColor}16 0%, ${C.green5} 50%, ${C.bg} 100%)`
          : `linear-gradient(160deg, ${C.green5} 0%, ${C.bg} 100%)`,
        position:'relative',
      }}>
        {/* ← voltar — área de toque ampla, z-index acima da planta */}
        <button type="button" className="tap" onClick={onBack} aria-label={t('aria_back')} style={{
          position:'absolute',top:42,left:10,background:'none',border:'none',
          fontSize:18,color:C.sub,cursor:'pointer',fontFamily:'inherit',
          width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',
          borderRadius:22,zIndex:5,
        }}>←</button>

        {/* ··· editar — discreto mas encontrável */}
        <button type="button" className="tap" onClick={()=>setEditMode(true)} aria-label={t('aria_edit')} style={{
          position:'absolute',top:42,right:10,background:'none',border:'none',
          fontSize:20,color:C.sub,cursor:'pointer',fontFamily:'inherit',letterSpacing:'.08em',
          lineHeight:1,width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',
          borderRadius:22,zIndex:5,
        }}>···</button>

        {/* planta */}
        <div style={{
          display:'inline-block',
          filter:plantFilter(tier), opacity:plantOpacity(tier),
          transition:'filter .6s ease, opacity .6s ease',
          marginBottom:6,
        }}>
          <div className="float" style={{display:'inline-block'}}>
            <PlantSVG type={person.plant.type} level={plantLevel(sc,tier)} color={person.plant.color} size={104}/>
          </div>
        </div>

        {/* vaso — tap area generoso, color picker */}
        <div style={{display:'flex',justifyContent:'center',marginBottom:12,position:'relative'}}>
          <div
            className="tap"
            onClick={()=>setColorPicker(v=>!v)}
            style={{
              padding:'8px 12px',        /* área de toque generosa */
              cursor:'pointer',
              borderRadius:16,
              background: colorPicker ? `${person.favColor||C.green4}22` : 'transparent',
              transition:'background .2s',
            }}
            title={t('tooltip_fav_color')}
          >
            <Pot size={48} tintColor={person.favColor||null}/>
          </div>

          {/* color picker — flutua abaixo do vaso */}
          {colorPicker && (
            <div className="fade-in" style={{
              position:'absolute', top:'100%', left:'50%',
              transform:'translateX(-50%)',
              background:C.white,
              borderRadius:20,
              padding:'12px 14px',
              boxShadow:'0 8px 32px rgba(0,0,0,0.14)',
              zIndex:20,
              display:'flex',gap:8,flexWrap:'wrap',
              width:220,justifyContent:'center',
            }}>
              {COLOR_SWATCHES.map(sw=>(
                <button key={sw.hex} className="tap" onClick={()=>{
                  onEditColor(person.id, sw.hex===person.favColor?'':sw.hex);
                  setColorPicker(false);
                }} title={(t('color_names')||{})[sw.key] || sw.key} style={{
                  width:30,height:30,borderRadius:15,
                  background:sw.hex,border:'none',cursor:'pointer',
                  outline:person.favColor===sw.hex?`3px solid ${C.green1}`:'3px solid transparent',
                  outlineOffset:2,
                  transform:person.favColor===sw.hex?'scale(1.18)':'scale(1)',
                  transition:'all .15s',
                }}/>
              ))}
              {person.favColor && (
                <button className="tap" onClick={()=>{onEditColor(person.id,'');setColorPicker(false);}} style={{
                  width:'100%',background:'none',border:'none',fontSize:10,color:C.sub,
                  cursor:'pointer',fontFamily:'inherit',marginTop:4,
                  textDecoration:'underline',textDecorationStyle:'dotted',
                }}>{t('remove_color')}</button>
              )}
            </div>
          )}
        </div>

        {/* overlay para fechar picker */}
        {colorPicker && (
          <div onClick={()=>setColorPicker(false)} style={{
            position:'fixed',inset:0,zIndex:19,
          }}/>
        )}

        {/* nome + badges */}
        <h2 style={{fontSize:22,fontWeight:400,color:C.text,marginBottom:7}}>{person.name}</h2>
        <div style={{display:'flex',justifyContent:'center',gap:6,alignItems:'center',
          marginBottom: person.phone ? 10 : 0}}>
          <BondBadge bond={person.bond}/>
          {days !== null && days <= 30 && <BirthdayChip days={days}/>}
        </div>

        {/* ícones de contato — só se tiver telefone plausível (>=8 dígitos) */}
        {e164 && (
          <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:4}}>
            <a href={`tel:+${e164}`} className="tap" style={{
              width:36,height:36,borderRadius:18,
              background:'rgba(255,255,255,0.75)',border:'1px solid rgba(0,0,0,0.07)',
              display:'flex',alignItems:'center',justifyContent:'center',
              textDecoration:'none',fontSize:16,boxShadow:'0 1px 6px rgba(0,0,0,0.08)',
            }}>📞</a>
            <a href={`https://wa.me/${e164}`} target="_blank" rel="noopener noreferrer" className="tap" style={{
              width:36,height:36,borderRadius:18,
              background:'rgba(255,255,255,0.75)',border:'1px solid rgba(0,0,0,0.07)',
              display:'flex',alignItems:'center',justifyContent:'center',
              textDecoration:'none',boxShadow:'0 1px 6px rgba(0,0,0,0.08)',
            }}>
              <svg width="18" height="18" viewBox="0 0 32 32">
                <circle cx="16" cy="16" r="16" fill="#25D366"/>
                <path fill="white" d="M16 5C9.93 5 5 9.93 5 16c0 1.93.5 3.74 1.37 5.32L5 27l5.83-1.35A10.94 10.94 0 0016 27c6.07 0 11-4.93 11-11S22.07 5 16 5zm5.56 15.36c-.24.67-1.38 1.26-1.9 1.34-.52.08-1.01.35-3.39-.71-2.83-1.24-4.63-4.11-4.77-4.3-.14-.19-1.17-1.57-.08-2.67 1.1-1.1 1.43-.5 1.63-.5.2 0 .35.01.5.01.16 0 .4-.06.61.47.24.55.79 1.91.86 2.06.08.14.12.31.02.49-.11.17-.16.28-.31.44-.16.15-.33.34-.47.46-.14.14-.28.3-.12.57.15.27.7 1.17 1.52 1.9 1.05.94 1.93 1.22 2.2 1.36.26.14.42.11.58-.06.16-.17.67-.78.85-1.05.17-.27.35-.22.58-.13.23.09 1.49.7 1.74.83.25.13.42.19.49.3.06.11.06.66-.18 1.31z"/>
              </svg>
            </a>
          </div>
        )}
      </div>

      {/* conteúdo */}
      <div className="scroll-hidden" style={{flex:1,padding:'18px 22px',overflowY:'auto'}}>

        {/* aniversário — só se tiver e for relevante */}
        {person.birthday && days !== null && days <= 30 && (
          <div style={{
            background: days<=7 ? C.birthdaySoft : C.card,
            borderRadius:14,padding:'12px 16px',marginBottom:12,
            boxShadow:'0 2px 8px rgba(0,0,0,0.04)',
            display:'flex',alignItems:'center',gap:10,
          }}>
            <span style={{fontSize:18}}>🎂</span>
            <p style={{fontSize:13,color:C.text}}>
              {formatBirthday(person.birthday)}
              <span style={{color:days<=7?C.birthday:C.sub,fontSize:12,marginLeft:8}}>
                {days===0?t('detail_today'):t('detail_in_days',days)}
              </span>
            </p>
          </div>
        )}

        {/* último momento registrado — ou nota de criação */}
        <div style={{background:C.card,borderRadius:14,padding:'16px 18px',marginBottom:12,
          boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
          {lastMoment && (
            <p style={{fontSize:10,color:C.sub,fontWeight:500,marginBottom:6,
              textTransform:'uppercase',letterSpacing:'.04em'}}>{t('last_moment')}</p>
          )}
          <p style={{fontSize:14,color:C.text,lineHeight:1.7}}>
            {lastMoment ? lastMoment.text : person.note}
          </p>
        </div>

        {/* eventos */}
        <div style={{marginBottom:12}}>
          {(person.events||[]).map(ev=>{
            const cd = eventCountdown(ev.date,ev.time);
            if (!cd) return null;
            const isToday    = isEventToday(ev.date);
            const isTomorrow = isEventTomorrow(ev.date);
            const urgent     = cd.urgency==='high'||cd.urgency==='now';
            return (
              <div key={ev.id} className={urgent?'pulse':''} style={{
                background: isToday ? '#EEF2FF' : C.card,
                borderRadius:12,padding:'11px 14px',marginBottom:8,
                boxShadow:'0 1px 6px rgba(0,0,0,0.05)',
                borderLeft: isToday?'3px solid #5A72AA':isTomorrow?'3px solid #8AA0CC':'3px solid transparent',
                display:'flex',alignItems:'center',gap:10,
              }}>
                <div style={{
                  flexShrink:0,width:34,height:34,borderRadius:10,
                  background:isToday?'#5A72AA':isTomorrow?'#8AA0CC':'#C8D4E8',
                  display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                }}>
                  <span style={{fontSize:11,color:'white',fontWeight:600,lineHeight:1}}>
                    {ev.date.split('-')[2]}
                  </span>
                  <span style={{fontSize:10,color:'rgba(255,255,255,0.82)',lineHeight:1.3}}>
                    {(STRINGS[lang]||STRINGS.pt).months[parseInt(ev.date.split('-')[1])-1]}
                  </span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:13,fontWeight:500,color:C.text,
                    whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ev.title}</p>
                  <p style={{fontSize:11,color:isToday?'#5A72AA':C.sub,marginTop:1}}>
                    {ev.time} · {cd.label}
                  </p>
                </div>
                <button className="tap" onClick={()=>onDeleteEvent(person.id,ev.id)} style={{
                  background:'none',border:'none',fontSize:13,color:'#C8B0A8',
                  cursor:'pointer',lineHeight:1,padding:2,
                }}>×</button>
              </div>
            );
          })}

          {/* passados (discretos) */}
          {(person.events||[]).filter(ev=>!eventCountdown(ev.date,ev.time)).map(ev=>(
            <div key={ev.id} style={{
              display:'flex',alignItems:'center',gap:10,
              padding:'6px 14px',marginBottom:4,opacity:.38,
            }}>
              <div style={{width:28,height:28,borderRadius:8,background:C.green4,
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <span style={{fontSize:11,color:C.sub,fontWeight:600,lineHeight:1}}>{ev.date.split('-')[2]}</span>
                <span style={{fontSize:10,color:C.sub,lineHeight:1.3}}>
                  {(STRINGS[lang]||STRINGS.pt).months[parseInt(ev.date.split('-')[1])-1]}
                </span>
              </div>
              <p style={{fontSize:11,color:C.sub,textDecoration:'line-through',flex:1,
                whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ev.title}</p>
              <button className="tap" onClick={()=>onDeleteEvent(person.id,ev.id)} style={{
                background:'none',border:'none',fontSize:12,color:C.sub,cursor:'pointer',lineHeight:1,
              }}>×</button>
            </div>
          ))}

          {/* form novo evento */}
          {addingEvent && (
            <div className="fade-in" style={{background:C.green5,borderRadius:14,padding:'14px 16px',marginBottom:8}}>
              <input ref={evTitleRef} value={evTitle} onChange={e=>setEvTitle(e.target.value)}
                placeholder={t('evt_title_ph')} maxLength={50}
                onKeyDown={e=>e.key==='Enter'&&submitEvent()}
                style={{width:'100%',background:C.white,
                  border:`1.5px solid ${evTitle?C.green2:'#DDE4D8'}`,
                  borderRadius:10,padding:'10px 12px',fontSize:14,fontWeight:300,
                  color:C.text,fontFamily:'inherit',outline:'none',
                  caretColor:C.green2,marginBottom:10,transition:'border-color .2s'}}/>
              <div style={{display:'flex',gap:8,marginBottom:8}}>
                <input type="date" value={evDate} onChange={e=>setEvDate(e.target.value)}
                  style={{flex:1,background:C.white,border:`1.5px solid ${evDate?C.green2:'#DDE4D8'}`,
                    borderRadius:10,padding:'9px 10px',fontSize:13,color:evDate?C.text:C.sub,
                    fontFamily:'inherit',outline:'none',cursor:'pointer',transition:'border-color .2s'}}/>
                <input type="time" value={evTime} onChange={e=>setEvTime(e.target.value)}
                  style={{width:96,background:C.white,border:`1.5px solid ${evTime?C.green2:'#DDE4D8'}`,
                    borderRadius:10,padding:'9px 10px',fontSize:13,color:evTime?C.text:C.sub,
                    fontFamily:'inherit',outline:'none',cursor:'pointer',transition:'border-color .2s'}}/>
              </div>
              <p style={{fontSize:10,color:C.sub,marginBottom:10}}>
                {t('event_reminder_note')}
              </p>
              <div style={{display:'flex',gap:8}}>
                <button className="tap" onClick={()=>{setAddingEvent(false);setEvTitle('');setEvDate('');setEvTime('');}}
                  style={{flex:1,padding:'10px',background:C.card,border:'none',borderRadius:10,
                    color:C.sub,fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>{t('cancel')}</button>
                <button className="tap" onClick={submitEvent}
                  disabled={!evTitle.trim()||!evDate||!evTime}
                  style={{flex:2,padding:'10px',
                    background:evTitle.trim()&&evDate&&evTime?C.green1:C.green4,
                    border:'none',borderRadius:10,
                    color:evTitle.trim()&&evDate&&evTime?C.white:C.sub,
                    fontSize:13,fontWeight:500,
                    cursor:evTitle.trim()&&evDate&&evTime?'pointer':'default',
                    fontFamily:'inherit',transition:'all .2s'}}>{t('save_evt')}</button>
              </div>
            </div>
          )}

          {/* + evento — contextual, ao fim da lista */}
          {!addingEvent && (
            <button className="tap" onClick={()=>setAddingEvent(true)} style={{
              background:'none',border:'none',
              fontSize:12,color:C.sub,cursor:'pointer',
              fontFamily:'inherit',padding:'4px 2px',

              opacity:.7,
            }}>
              <span style={{fontSize:16,lineHeight:1}}>+</span> {t('add_evt_btn')}
            </button>
          )}
        </div>

        {/* insight — rotação por pessoa + dia da semana */}
        {(()=>{
          const ins = INSIGHTS[lang] || INSIGHTS.pt;
          const dayOfYear = Math.floor((TODAY - new Date(TODAY.getFullYear(),0,0)) / 86400000);
          const idx = (dayOfYear + (person.name.charCodeAt(0)||0)) % ins.length;
          return (
            <div style={{background:C.green5,borderRadius:14,padding:'12px 16px',
              borderLeft:`2.5px solid ${C.green3}`}}>
              <p style={{fontSize:12,color:C.green1,lineHeight:1.7,fontStyle:'italic'}}>
                "{ins[idx]}"

            </div>
          );
        })()}
      </div>

      {/* ação primária */}
      <div style={{padding:'0 22px 38px'}}>
        <button className="tap" onClick={handleMoment} style={{

      {/* bottom sheet trocar planta */}

            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:22}}>
              {PLANT_OPTS.map(p=>{
                const isCurrent = !pickedPlant && p.type===person.plant.type;
                const isSel     = pickedPlant?.id===p.id;
                return (
                  <button key={p.id} className="tap"
                    onClick={()=>setPickedPlant(p.id===pickedPlant?.id?null:p)} style={{
                      background: isSel?C.green5:isCurrent?`${C.green5}88`:C.card,
                      border: isSel?`2px solid ${C.green2}`:isCurrent?`2px solid ${C.green3}`:'2px solid transparent',
                      borderRadius:14,padding:'10px 4px',
                      display:'flex',flexDirection:'column',alignItems:'center',gap:5,
                      cursor:'pointer',boxShadow:'0 1px 6px rgba(0,0,0,0.05)',transition:'all .18s',
                    }}>
                    <div className={isSel?'float':''}><PlantSVG type={p.type} level={2} color={p.color} size={36}/></div>
                    <span style={{fontSize:11,color:isSel?C.green1:C.sub,fontWeight:isSel?500:400}}>{(t('plant_names')||{})[p.type] || p.name}</span>

              <button className="tap" onClick={()=>setPlantSheet(false)} style={{

                flex:2,padding:'13px',

      )}

  );
}

/* ══════════════════════════════════════════
   TELA — MOMENTO
══════════════════════════════════════════ */
function MomentScreen({ person, onBack, onSave }) {
  const t = useT();
  const [text, setText] = useState('');
  const [saved, setSaved] = useState(false);
  const ref = useRef(null);
  /* timers com cleanup — evita "state update after unmount" warnings */
  const focusTimer = useRef(null);
  const backTimer  = useRef(null);
  useEffect(()=>{
    focusTimer.current = setTimeout(()=>ref.current?.focus(), 280);
    return () => {
      clearTimeout(focusTimer.current);
      clearTimeout(backTimer.current);
    };
  },[]);

  function save() {
    if (!text.trim()) return;
    setSaved(true);
    onSave && onSave(person.id, text.trim());
    clearTimeout(backTimer.current);
    backTimer.current = setTimeout(onBack, 1100);
  }

  return (
    <div className="slide-up" style={{height:'100%',display:'flex',flexDirection:'column',padding:'52px 24px 38px'}}>
      <button className="tap" onClick={onBack} style={{
        background:'none',border:'none',fontSize:13,color:C.sub,
        cursor:'pointer',textAlign:'left',marginBottom:36,
      }}>← {person.name}</button>

      <div style={{marginBottom:6}}>
        <p style={{fontSize:12,color:C.sub,marginBottom:3}}>{t('moment_with')}</p>
        <h2 style={{fontSize:26,fontWeight:300,color:C.text}}>{person.name}</h2>
      </div>

      <div style={{flex:1,display:'flex',flexDirection:'column',paddingTop:28}}>
        <textarea ref={ref} value={text} onChange={e=>setText(e.target.value)}
          placeholder={t('moment_ph')} maxLength={1000}
          style={{
            flex:1, background:'transparent', border:'none', outline:'none',
            resize:'none', fontSize:16, color:C.text, lineHeight:1.75,
            fontFamily:'inherit', fontWeight:300, caretColor:C.green2,
          }}/>
        <div style={{height:1,background:`linear-gradient(90deg,${C.green3},transparent)`,
          marginBottom:30,opacity:text?.2:0.25,transition:'opacity .3s'}}/>
      </div>

      <button className="tap" onClick={save} disabled={!text.trim()} style={{
        width:'100%', padding:'15px', borderRadius:15, border:'none', fontFamily:'inherit',
        background: saved ? C.green3 : text.trim() ? C.green1 : C.green4,
        color: text.trim() ? C.white : C.sub,
        fontSize:15, fontWeight:500,
        cursor: text.trim() ? 'pointer' : 'default',
        transition:'all .3s ease',
      }}>
        {saved ? t('moment_saved') : t('moment_save')}
      </button>
    </div>
  );
}
